body:
  text: 歸田稿别集類五明提要臣等謹案歸田稿八卷明謝遷撰遷字于喬餘姚人成化乙未賜進士第一授修撰厯官户部尚書謹身殿大學士贈太傅諡文正事蹟具明史本傳遷之在內閣也與劉健李東陽同心輔政史稱其秉節直諒見事明敏天下稱為賢相庶乎能以道事君者其文集全稿以嘉靖中倭亂被燬此乃其致仕以後及再召時所作自題曰歸田稿以授其子至者國朝康熙中其七世孫大名府同知鍾和復加釐輯梓而傳之集中奏疏類多晚年陳謝之作而在朝時嘉謨讜論均已亡佚無存即以史所稱請罷選妃嬪禁約內官諸疏卓卓最著者而亦不在其閒則其散失者當復不少然遷當歸里以後正劉瑾焦芳等挾怨修郤日在危疑震撼之中而所作詩文大抵詞旨和平惟惓惓焉托江湖魏闕之思以冀其君之一悟老臣憂國之心實有流溢於不自覺者讀者知其忠悃所存固毋庸以文字之工拙論矣乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ae341e4df2eceb89b4dff73789041dc245497b2bdeb7d944e2efb17bdb158cc3
