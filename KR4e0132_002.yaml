body:
  text: 歸田稿卷二明謝遷撰序類山莊唱和小序是嵗夏雪湖三過余杏莊夏初迄仲頗有旱暵之虞既而連得雨農事孔嘉且雨中倍凉爽吾兩人相與盤桓甚適時復賡一詩為樂韻仍舊而意彌新各得詩二十四首而别别後餘興相往復又各得四首時則夏季向秋旱復如初夏故其間不能無憫農之意也自豫歸汝曲閒中與雪湖以文字相娛唱和不少今夏㑹尤數詩尤多故特録為一卷後㑹有作當更續書之也時甲戍六月晦日木齊識湖山唱和序豫既謝事歸養疴海陬知舊多疏絶蓋以零落殆盡間有存者亦相逺逾時經嵗不獲一聚首雪湖素莫逆居甚邇且强健無恙日相與往還雪汝兩湖之間山水頗幽勝盤桓不厭雪湖工于詩酷好吟咏興至時輒有作豫雖拙强而企焉有唱斯和因以為樂不知老之將至也居無何豫橫罹罪纍戒吟思咎于時雪湖亦有母夫人之憂杳然絶響者幾三載洎豫蒙寬宥雪湖亦從吉乃復作積久遂盈卷帙蓋雖消閒遣興而其間懷君愛國憫世憂時之意亦自有不容已者吾邑尹劉侯應徵知吾二人之有是也强索觀之不以為蕪陋輒令從事史録之以去將以供燕覽且請豫識其顛末豫不能拒也嗟夫采詩以觀民風固王政之大端國風所陳無間美惡非徒然也去古既逺有司者從事于簿書期㑹之間日不暇給能者亦不過取辦承應茍免督責而已矣其知觀風審音不以為不急之務而蔑棄焉者幾何人哉不圖今日乃于吾劉侯得之良可嘉也吾輩詩雖無足采然閭閻之疾苦稼穡之艱難施措之缺失茍因其端而推見其至以究心于其間則亦豈非善政之一助也哉夫然則侯之尚文好古誠不為虛飾而吾輩之吟風㺯月亦不為無用矣詩凡若干首為二卷聨句若干首并附録焉㑹老嘉話序宫保大司冦兼都憲兩峯洪公其先上虞人也今年秋自杭城歸展先塋既竣事乃訪豫海濱豫初與公同進士第意氣孚合相視如弟昆宦路周旋餘三十載迄豫謝事歸道經淮揚值公以巡撫之節兼總漕運留戀不忍舍慨然以女許配吾子亘遂締姻盟後五年公總師川陜荆洛旋休致歸杭公女不幸殤折然時節問遺不廢往還公二子靜夫巨夫亦視吾諸子如昆弟通家眷愛之情有加杭城去吾邑僅三百里乃有錢塘曹娥餘姚三江之隔舟車跋涉良艱欲與公一晤言不可得停雲之歎恆切于懷聞公來喜不自勝亟遣吾子正丕往候于上虞途次且邀憲副雪湖馮公過豫山莊出髙橋同迓之雪湖吾姻家老契與公同鄉薦同官秋曹素莫逆者也已而同年友太守滑公宗源亦來㑹時則鄉彥孫生維獻介公行而吾弟迪及正丕皆侍焉杭州衛總麾白侯允章頗好事公推愛之適有事臨山偕揮使李侯克明俱來謁李亦吾姻家公德輝所及人固快覩之也盤桓纍日賓主盡歡最後同過臨山訪雪湖復盤桓追送至上塘而别豫與公話舊之餘時賦一詩道意公和之衆皆屬和自始至暨别凡得詩若干首鄉邦縉紳亦有聞而遙和者正總緝成卷曰將以為後日嘉話之徵也於戲太丘朗陵之㑹漢史傳之至于今人羡之不衰豈非以其名德之盛有足起人敬慕者乎余陋劣不敢妄希古人若公望重當時視古無忝況公之是行水源木本之思姻親交友之誼實兼得之又有出于古人之外者安知後之視今不猶今之視昔也耶贈都憲何君巡撫河南序聖天子嗣承大統肇更化理剗剔蠧弊登崇俊良于是吾浙左方伯何君道亨遂有巡撫河南都御史之擢豫聞之喜因仰而嘆曰聖智天授真知更化之要哉夫亷耻者士大夫之大間風俗者國家之元氣也往自怙勢竊柄之奸作大啓僥幸之門而士習為之一變貪汙奔競波蕩風靡尅剝之政日加于下而生靈困憊有不忍言者矣今欲一洗而新之不在表率之地激揚之任乎道亨初為御史即著聲臺端間以直言為讒邪所中傷紛紜之際濫係黨籍已而大憝就戮善類稍蘇乃起為郡守薦厯憲副至長吾浙憲陟方伯盤桓居貞于兹有年清白堅持終始如一吏畏而民懷之不次之擢縉紳屬望久矣兹當善治之初首膺簡拔則夫所謂激揚表率于一方者真可謂得人矣且道亨嘗守河南儉德雅操素孚于人今其往也風聲所至蓋將不令而行郡守庶寮有不惕然革心者乎閭閻小民有不蒙被其澤者乎中州大藩切近京輔異日政成化洽入長內臺以當股肱耳目之寄以昭四方風動之休以成一代明良之盛又將不在吾道亨乎道亨行豫以知舊之愛既為作一詩而藩司諸同寅復以贈言請不能辭故復道吾意所未盡者如此使軺贈言序余自乞骸歸海壖十有六年于兹每竊思念辜敬皇末命罪無所逃幸而茍免誅責乃閉戶養疴待盡而已皇上誕膺天命嗣承大統聖德廣被政化一新以某先朝舊臣特蒙軫念賜敕遣官存問于時錢塘進士邵君某試政春官攝行人捧敕以來君小心翼翼將命惟謹至則奉宣德意既優且渥光被草萊遐陬僻壤之間老稚歡呼填塞閭巷臣某寵榮踰分愈縮恧戰兢措躬無地而鄉里縉紳大夫士乃以為曠世殊典咸為某歆羡不置故于邵君之還侈為詩歌以贈非直以壯行色實以頌聖德昭盛傳于不朽也謂某亦不可以無述余何以為邵君贈哉余嘗讀皇華之詩始而曰周爰咨諏既而曰周爰咨謀曰周爰咨度曰周爰咨詢反覆丁寧不一而足蓋古昔聖王遣使于外欲其宣上德而達下情故以廣詢博訪委之為臣者亦惟恐不盡其職而諏謀度詢無所不用其至也方今聖明更化諏咨善道下逮民隱如恐不及邵君奉使雖為存問老臣而來然自京師而抵南服往返數千里間道路之所經行耳目之所見聞得咨訪者多矣抑古者采詩觀民風蓋謂閭閻里巷之情狀率于歌謡見之君于諸縉紳贈行之作而玩索焉則民風之堙鬱亦或有得于言意之表者歸而併獻諸當寧以廣聰明之萬一則亦豈非老臣之所願望者哉贈邑宰丘君以義被召之京序吾餘姚以文獻稱久矣而蒞兹土者往往有畏難之色豈文獻足徵之邦顧不若荒野鄙陋之地之易治乎是蓋有說矣夫惟地大故人衆人衆故事繁事繁故政劇茍非操持之有要施措之得宜則簿書填委期㑹叢脞日給不暇誠有不勝其難為者勢固然也今觀吾丘君之蒞吾邑則又祗見其易乃知非地之難人自難耳君以妙年登進士第初踐仕途即蒞兹大邑閲厯未深而臨事之際從容裁決動中肯綮若老于世故者始至持法甚嚴凛不可犯及夫威令既行豪滑斂避則更濟以寬和所謂平易近民者君實有之久之上下相孚令不煩而事集蓋其明敏果斷天資過人而將之以亷慎勤恪故能得夫操持之要施措之宜如此吾邑負難治之名至君而一洗之矣故今甫及二載聲譽籍甚觀風之使數加旌奬銓曹以聞于上召命遂下將有臺憲之擢吾既喜公道之明而又悵吾邑人之失所恃賴欲留之而不可得也噫若君之品識固宜駸登顯秩洊膺重任以膏澤天下豈吾一邑之人之所得私也哉君行矣其尚益堅乃志益慎乃心益𢎞乃業庶幾永終令譽以慰吾邑人去後之思是則區區之所願望者也贈都憲某公序某公當代風力士也當其官都察院右副都御史領四川巡撫之節藩司同寅諸公重其行以贈言見屬公之來蒞吾浙也雅志為民事必循軌度其律已甚嚴無所撓屈時方有貴幸來有事于浙憤有司將迎之弗至文致其罪而波及于公坐是待報者纍閲月人皆為公危之公自處裕如惟俟命而已既而聖明察知其非辜俾還職未幾乃有超擢之命輿論咸以為宜蓋公之節行夙有源委卓然樹立不忝其家乘粵自初登進士第列職郎署以至揚厯藩省在在有聲為縉紳所推重豫病卧海濱雖罕所交接亦頗聞其槩洎來吾浙目擊其行事益信所聞之不誣今其行固豫所喜聞而樂道者言何能辭顧惟衰耄之言何足為公重然亦竊有欲告焉者夫致治之要莫急于厚民生以固邦本自昔聖帝明王之治未有不以是為先務我祖宗列聖相承尤惓惓焉百數十年來深仁厚澤固結于民心者至矣故雖或有釁孽而逺近無離心良以是也比嵗災沴頻作饑饉薦臻而官府無名之科需日益以繁生民之膏血日就竭矣任司牧之寄者乃恬不介意真若秦人視越人之肥瘠何哉蓋自權奸竊柄以來幸門大啓士習為之一變惟其身之謀而罔知閭閻疾苦之當恤者亦多矣雖更維新之化餘風尚未盡殄此有識者之所深憂而竊歎者也轉移之機不在激揚表率之地乎公今之蜀蜀固其舊治也一方興革宜知之已悉今之權任又非曩昔之比即其所被及于吾浙者而推之則其所以慰棠隂之思于蜀人者不言可知矣蜀之人一何幸哉異日政成化洽譽望益隆進長內臺當天子腹心耳目之寄則其膏澤所及又豈直一方而已哉請以是為公贈胥溪八咏詩序胥溪八咏詩者建平吕君文郁思其親而作也士大夫交于君者從而和焉久之成巨帙而以序來請豫憶曩嵗鄉友賈郡博汝易嘗道文郁之賢與胥溪之勝領㑹心目之間有日矣于其請也能不為之言乎夫所謂胥溪者蓋文郁所居之地當吳楚之界伍子胥棄楚入吳嘗渡此溪而憩息焉後人仰子胥之忠孝遂以名溪文郁之父仲和翁因取以為號其名益揚翁性恬淡日徜徉于胥溪之上當其耕讀釣隱意與景㑹之時雖世所謂台鼎之榮陶猗之富舉不足以動其心而移其志是胥溪之景天若為翁而設然非翁則亦莫能賞識如此其至也翁沒十有三年文郁登甲科官郎署翁獲褒錫之榮而養不逮胥溪之勝固在也古者孝子思其親于居處笑語志意樂嗜必極其想象形容之真文郁之于胥溪其能一日已于情乎此八景之詩所由作也此諸君子所以繼聲而不容少靳也嗟夫勝景之在天地間不幸遇非其人而淪沒于荒烟宿莽之中者多矣胥溪之勝固以翁而勝然非文郁為之揄揚則有聲之畫摹寫逼真又未必若是其工且富也是集既傳豈惟益著胥溪之名而文郁不死其親之孝亦于是乎顯矣抑水注川為溪是其涓涓之泉可達之而為盈科放海之勢翁之所取于胥溪者不有在于是乎源故澄而濬之以比潔已之操流故長而導之以喻澤物之功是八景之外又翁之所獨得而未及究竟以望其後人者兹文郁推胥溪之意潤溉斯民固足以潄餘芳矣他日以其澤澤天下使溪山人物並美交重則有志乘史冊在是集特為之發軔耳豫雖老尚拭目以俟正德丙寅孟夏既望記類旌忠詞記旌忠祠者有司奉上命以祀死忠之臣也正德已卯夏六月十有四日寧藩逆賊宸濠反假宴㑹集撫按藩臬暨諸司于庭環列兵刃首呼巡撫都御史餘姚孫公燧詐稱密㫖令起兵脅使從逆公正色抗詞折之請見密㫖濠語塞公復矢以天無二日臣無二君之義次問按察副使固始許公逵亦毅然曰惟有赤心耳豈從反乎濠怒令兵校曵出惠民門戕之二公罵不絶口延頸受刃時方盛陽日慘然無光忽有黑雲蔽其尸竟日父老奔赴飲泣為斂于僧舍朝夕哀之濠見黑雲之異亦驚怖遣人為市棺而棺已具諸民矣蓋逆濠之蓄異謀為日已久孫公窺見其萌凡所以預為之防者靡不用其至濠務剝下以結權幸民不聊生公志在恤民每裁抑之動拂其意許公亦同志濠故知其必不可屈也首肆毒且用以威衆民亦以是哀感之深也既而巡撫南贛都御史王公守仁起義兵討賊濠敗遂伏誅恭遇皇上嗣承大統詔禮部官議褒恤而巡按御史唐龍復疏請廟祀二公奉㫖贈燧禮部尚書諡忠烈逵左副都御史諡忠節賜葬祭有加各録䕃其子且命立祠享祀南昌城中舊有土神廟一區父老撤去神位奉二公祀之私號曰全大節祠以時謁禱及奉朝命有司遂修祀事于兹而淺隘弗稱巡撫都御史陳公琳嘗檄布政使陳策蔣曙按察使曽大有謀改作事未就緒各遷代以去都御史盛公應期繼至巡撫素重風教慨兹祀典宜隆乃檄布政使王藎嚴紘參政徐瓉林廷㭿馮馴參議陸溥陳墀暨吾弟迪按察使丁沂副使周廣咨度之僉謂貢院舊址靣俯東湖明爽宏邃足以妥英靈而起瞻仰白于鎮巡諸公咸可其議乃委南昌府同知劉守愚率縣丞彭齡等董其役經始于嘉靖癸未秋九月迄甲申春二月而落成矣先是正德壬申瑞州華林冦猖獗按察副使安陸周公憲督兵追勦身先士卒父子俱殞于賊事聞已蒙贈憲按察使諡節愍而未與祀典盛公疏請于朝下禮官議合以死勤事之義特允配享旌忠祠綸音逺降適新祠考成乃奉孫許二公並位南向而以周公配享于左于時左布政使陳洪謨始至率僚屬祗薦嵗事廟貌崇嚴山川改觀忠魂義槩儼若著存式慰邦人瞻仰之情祠五間前為享堂又前為中門為外門各殺其二廂廡庖湢及諸供祀之所以間計者凡二十繚以周垣深以丈計者四十有八廣以丈計者二十有七既完既固瞰湖竪綽楔石為之扁曰旌忠遵聖訓也凡木石工役之費皆出自官帑于民無秋毫之擾經畫調度纎悉畢舉皆盛公所指授也于是盛公遣使致書屬豫紀其成吾弟亦以書來促此固區區之所欽羡而樂道者也何敢以衰耄辭嗟夫為子死孝為臣死忠誠天地之大義也義當死則舍生而取義降衷秉彛人孰無之聖賢立教垂訓昭如日星章縫之士亦且素講而飫聞之矣然非見之真信之篤守之固而能不迷眩于臨難之頃者幾希若三君子者捐軀殉國從容慷慨白刃如飴視昔顔袁二公之在常山張許二公之在睢陽蓋異世而同符非其胸中確然素定能如是乎真可謂無忝所生不負所學者乎彼蠖屈鼠伏茍一時之生者能無愧于心乎江西舊有康山廟祀三十六人豫章廟祀十四人皆開國時死忠之臣也仰惟我聖祖再造區夏振綱常于淪斁之餘故當時同德不二之臣雲合景從其盛有如是者百數十年來列聖相承仁涵義育內寧外安仗節死義之士無所于見往嵗逆豎竊柄摧挫善類余懼夫士氣之沮喪也每竊憂之今適遇事變而二三君子挺然繼作光昭前烈所謂疾風知徑草嵗寒知松柏信不誣矣天地之正氣祖宗之遺澤不于是在乎此又深為世道慶也嗚呼旌忠之祠與前二廟列峙邦域輝映古今以風勵于天下豈直一方之偉觀一時之美談而已哉重修定海縣學記正德庚辰都御史髙密李公昆左遷浙江按察司副使領巡視海道之命駐節定海首詣學謁廟目擊圮敝慨然以修復為己任適邏吏獲海艘非式者鬻直足充其費遂定議于巡視都御史許公庭光巡按御史唐公鳳儀僉曰宜乃以厥成責之知縣鄭君餘慶始事于是嵗之夏六月訖工于辛已之冬十二月像設嚴整規制宏邃自殿廡祠宇以及齊堂廨舍庖湢之類罔不改觀甃石凡若干所繚垣凡若干尺闢地凡若千丈增屋凡若干楹財不告匱民忘其勞是雖鄭君經營之功大都出李公指授也考之縣志定海有學自宋雍熙始中間興墜屢矣至我朝成化間憲副朱公紳嘗一新之迄今五十餘年而修舉盛美乃于更化之㑹見焉不亦有數存乎其間耶鄭君重念李公之績不可泯乃託吾姚鄉進士毛君復懇以記請遷何敢以難為言辭哉惟定海為萬水之㑹東望滄溟浩渺無際潮汐之往來日月之吞吐魚龍之出沒一舉睫而具見實大觀之區也昔我夫子亟稱于水豈徒取其周流無滯而已哉蓋道之所遇觸目㑹心自不容已川上之歎可想見也兹宫墻再新聖靈斯妥亟稱而歎之意宜必有無間于存亡者乎然則逰聖人之門者當何如必探無窮之道體事有本之學術充朝宗之念大回瀾之力庶幾其無愧乎斯固李公作新之意也是役也縣丞胡良主簿吳恭典史趙大和教諭李儒訓導劉綬李泰生員沃汝信薛俊周南義官俞章皆與有勞者因得附書墓志銘明故安處士墓志銘吾邑宰西夏楚君書每為豫談其鄉人安氏之盛纍世不分財異食家衆千指雍睦無間言豫聞而嘉之既而安氏之子指揮廷璋遣其弟來托楚君乞豫為銘其父處士之墓豫以衰耄筆硯久荒辭之固而楚君之請益力不得已則序而銘之處士諱海字士溶其先姑蘇長洲人也髙祖諱福三國初從軍以功升總旗調寧夏中護衛係籍至今曽祖諱忠祖諱昱考諱某今官千户者曰廷璧蓋處士從子也處士自少倜儻負槩不羣涉獵書史頗適大義天性孝友事親能先意承志不少忤遇同氣怡怡如也識達事體每億料多中人有疑勿能決者多就質焉縱游淮浙荆湘間惟意所適晚樂維揚風土之勝遂僑寓成家家素殷裕至處士益充拓資纍巨萬然好施豫周貧恤匱雖倒囊傾槖無吝色鄉鄰姻黨有依之以終身者四方文人墨士與之游者無間逺近久而益敬每以古人嘉言善行訓迪諸子姓子姓服其教皆循循雅飭家族衆盛今且六世矣無異籍者比有司以事聞詔旌其閭正德丙寅二月朔日以疾卒于維揚距生景泰甲戌四月望日得夀五十有三配孺人黃氏西夏士人諱璟之女有淑德善理家政處士遨遊湖海無內顧憂家聲輯睦無少間亦以有孺人助于內也孺人卒于嘉靖癸未四月一日距生景泰甲戌八月十一日得夀七十子男四人長即廷璋例授寧夏中屯衛指揮次廷璽廷珍俱秦府引禮舍人次廷瑨善服賈克家女一適寧夏中屯衛百戶劉瑨孫男五宗文宗武宗賢宗哲一尚幼女三長適衛庠生陳經世次聘髙烈俞權廷璋輩將奉處士及儒人柩合葬夏城之南原葬以某月某日嗚呼自世教衰民行日薄能惇德崇義承家睦族內外無間然者蓋亦寡矣而有之豈非君子所樂道哉若處士者宜可書也故銘以章之銘曰九世同居昔聞公藝寥寥千載乃見安氏家衆千指而食不異雍雍一門亦且六世詎謂戎伍懋兹德義啓後光前實惟處士夏城南原堂封斯閟我銘非諛用詔來裔當克承之引而勿替墓表憤齊先生墓表先生吾先妣夫人之弟諱珙字廷璧姓鄒氏憤齊其自號也先外祖悠然處士與外祖母俞孺人德善重于鄉慶鍾先妣及諸舅先生自幼秀頴異常長而篤志力學風格凝峻言動不茍人望之而起敬愛與先考簡庵少傅年相若以學業行誼相砥礪友愛如同氣先祖直庵少傅視之如親子弟然初蒞官閩藩時携以自隨遣就政和縣學司訓錢塘馮先生浩授詩經業成而歸鄉里大家爭延致為子師吾謝氏族屬頗衆曽叔祖克成處士素好禮合一門子弟師之某時方垂髫獲從諸生後見先生終日端坐不惡而嚴諸生一聆謦咳即竦然各肄其業罔不就規度蚤暮升散出入在途次亦循循有序鄉中父老見而知其為鄒先生學徒也臨山衛帥李侯選城中子弟之秀者幾百人闢館舍十餘楹延先生教之武辨家素號多頑劣先生學規嚴整率皆領其教無敢違氣習為之一變至今衛中人猶慕之成化初詔求經明行修懷才抱德之士餘杭知縣朱某舉先生應詔至京師在朝縉紳大夫士聞其名多遣子授業已而銓曹泥于例須本縣官舉遂為有力者所奪先生拂衣歸仍應浙江鄉試復不偶無何嬰股疾醫藥罔效遂不起成化戊子冬十二月十二日也時年方三十有六鄉邦衣冠之士無問識與不識莫不痛悼之嗚呼某嘗聞之記曰凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學世教衰微師道之不立久矣使如先生者得見用而任國學郡邑之師則其所造就豈胡安定得専美于前哉乃終不獲一試惜哉先生雖専經業而雅好吟咏詩法盛唐所著有憤齊稿藏于家先生世業儒家不甚充裕而篤于孝友平素所得束修之資悉以供門戶費無一毫私蓄及其殁人始知之配胡氏烏山處士諱鼎之女淑慎儉勤相先生恪遵婦道子男三人昌蚤卒升仕武平衛經厯杲未周而孤能自立女一人適同邑魏某孫男五人紡紀絢組練絢組俱為邑庠生絢力學如先生頗有時名繼述顯揚之美其將在絢乎先生殁六十有餘年矣而墓上之表尚缺是某之罪也某今亦老矣恐後遂湮沒無聞焉故力疾為纂述其梗槩如此令吾子中書舍人正為書而刻之若其家族世系則具見于悠然處士行狀此不復贅處士狀先祖直庵少傅所撰也題跋題史都憲墨竹卷後嗚呼此吾友一拙公手筆也以遺仲子鸞鸞珍藏之如拱璧既免喪間以示豫豫為之泫然者久之公平生樂易簡淡不役役于利而獨好游藝適情墨竹其尤工者也每以是自詫人求之亦不甚吝然公殁未幾而流落人間者已不可多見豈人與琴俱亡耶悲哉鸞以手澤存焉寶愛之至可為能子矣鸞素稱孝友慎篤豫愛之重之今觀于是而益信視彼狥利忘親雖其親所甚鍾愛者不啻秦越之相視而惟利之圖人鄙之殆若犬豕而彼方且自以為得計者豈直雲霄糞壤之相逺哉豫不欲斥其名而于是焉發之猶庶幾其或因吾言而有所悔悟耳題旌節録後旌表節婦所以樹風聲勵衆志昭物則厚民彛甚盛典也近例其人未及旌而沒不復與是典此實執事者沿襲拘礙之過也豈朝廷立法之本意哉夫自世教衰民俗漓貞志堅操完節全名求之縉紳大夫士已不可多得况婦人女子乎而有之則雖異代隔世猶當搜訪而表章之以示後况在當時耳目之所及者乃復旁出條格而沮尼之俾湮沒無傳焉謂之何哉吾固以為執事者之過也若洪雅李節婦者州閭鄉黨信之無間言郡邑亦既以聞于上矣方下觀風者核實未及報而節婦殁事遂寢及其子吉為廷平乃具疏懇請至再至三不己上憫其情特許之于是旌表之詔與貤贈之敕一時並下而節婦之勤劬堅苦始獲暴白于世不然幾何而不泯然也耶嗚呼是母之貞節足以信輿論是子之誠孝足以動宸衷皆可傳也使非遭際聖明洞燭幽隱亦何以得是哉然則吉之所以移孝為忠以圖報塞殊遇者亦當何如也耶題趙御史丹陛糾儀圖後此監察御史古巴趙君像也君嘗侍朝糾儀繪為圖以侈榮遇守溪翁為作贊詞意已獨至君來浙間以示豫夫禮莫嚴于朝廷故朝儀以御史糾之懲不肅也然殿陛森嚴天顔咫尺雖甚獷悍無良者至是亦神悸膽落其誰敢不肅哉乃或有愆于儀者蓋奏對興伏之頃進退周旋之際倉惶失措故爾朝廷設御史俾司風紀以肅百僚則其職之所當糾繩者豈直儀節之末而己哉置流啜而問齒决舍豺狼而問狐狸君子謂之不知務君之賢宜必知所擇矣君兹來鹽法是綜施措得宜憲節所臨奸豪屏跡吏民畏而懷之非知務能如是乎操是以往所至殆未可量也君尚朂諸題李西涯翰墨卷後涯老詞翰精妙人求之不甚靳豫與公為寮友餘三十載相愛甚厚吾兒丕又獲與其子兆先同筆硯麗澤相資者有年兆先不幸蚤逝公視丕如其子故尤加之意此卷精絶大非尋常應酬者比暌違來追惟疇昔游從笑語之歡邈不可得未嘗不悵然興懷每見其翰墨如接風采聊以自慰今年秋聞公奄作古人矣俯仰之間已為陳迹殆非虛語嗚呼悲哉閒中偶閲此卷為之泫然因識之題西涯詩篆卷後甲戌夏杏莊與雪湖唱和消遣詩頗多間因便摘寫數首寄西涯已而西涯寄和還以吾長子正稍習篆學素愛之故特示以篆體又慮傳附者或為殷洪喬再寄一通至此其後至者也正什襲謹藏之念昔居京時吾三人雅相好無何雪湖蚤暌違豫與西涯居獨久今歸老復得與雪湖遊而西涯逺隔數千里疇昔燕笑之歡邈不可得每形諸夢昧來和有云惟應兩巾履長得夢中遊又云羡君江海上猶得舊同遊者乃彼此之衷曲而公道之也不意公奄忽長逝矣嗚呼聚散存沒之感可勝言哉偶與雪湖一展卷相對酸楚不能已因以唱和原韻列于前而以哭公之詩係其後云題趙松雪墨跡趙松雪翰墨妙絶當世後人乃有美女插花之譏蓋病其太媚媚則媚矣不知其筆法自晉來媚中亦自有遒徑處近世刻本失真殊非本來靣目學之者復效顰太過遂漸相逺往往見其墨跡何嘗如傳刻之甚耶西賓朱國材出此帖示豫豫為持此論國材素得書法三昧者不以豫言為不然遂識之題一拙墨竹卷後都憲史公善墨竹每以是自適所作甚富然不吝與人公既歿其家篋笥所遺者無幾此卷蓋其得意仲子鄉貢進士鸞特寶藏之嵗久如新嗚呼平泉花木丁寧告戒不知當時子孫竟能保守之勿失否公雅量博愛雖所好不自私未嘗以戒子孫鸞乃愛護惟謹亦可謂賢矣鸞孝友淳篤謹節不茍繼述之圖實逺且大此特其細者耳不幸天不假其年齎志以殁哀哉鸞殁無後吾子編修丕自少同筆硯知其志意所存懼或流落非人也代為收藏之公與豫莫逆視丕猶其子丕今于公手澤不異乎鸞也固宜間以告豫豫為忍淚而識之題范以貞太守誥敕重榮卷後朝廷錫命于臣而及其親所以勵臣節也涖官盡職為人所稱道誠足以貽親之榮否則辱亦隨之以貞守寧國去郡幾三十年矣而其人思之不衰且有去思碑之作真可謂無忝所生而于上之錫命亦無負矣展卷之餘為之三嘆直庵存稿後跋先祖光祿公豪邁曠達平生有所作握筆伸紙頃刻間雖數千百言未嘗須搆思惟其易也視之若不屑為故未嘗存稿晚年家居時某始將成童出就外傅之餘侍左右私竊記録得數篇及稍長略通文義則公已棄背矣既又重蒞海溢之變家下文籍斷編殘簡皆沮洳之末故所存者止此耳痛哉某今亦已老懼公手澤遂泯焉無傳也命兒輩輯録之以系諸家乘嗚呼天機雲錦僅存尺寸識者固可窺見其全幅矣曽祖考妣行實先曽祖考府君諱廣字原廣以字行姓謝氏其先台州臨海縣人也始祖諱長二宋末徙家餘姚東山汝湖之汭上世譜牒失傳兹不敢妄述長二生明四明四生還一還一生夀松夀松生回益回益生見賢配余氏生府君自始祖定居來子孫繁衍多至數千百指遂為一巨族而世業耕讀安分自守無怨惡于鄉人雅稱善門至府君坦夷惇篤喜怒不形自少至老與物無競尤以長厚稱比鄰有無賴者隂鷙狡黠肆為橫逆睚眦之際輒昏夜火其廬鄉人畏之如蛇虎府君朝夕相與一于信誼終不以惡人視之彼亦不敢有所加也既而其人為怨家所報復合門煨燼寒舍棟宇密比幾為所延少頃風逐火熄巋然無恙鄉里嗟嘆咸云天道為有知也府君弱冠而孤克自樹立門戶賴以不墜與弟原度處士相友愛白首不渝處士得子遲以庶子璲為之子己而處士自有子亦竟不返蓋其友于之篤彼此無間也故今孫支相承雖五服已竭而雍睦弗替至于宗族姻黨親疏逺近雖不同亦無不感其德者至于今猶頌之不衰府君生洪武甲寅正月七日卒正統壬戌十一月二十六日夀六十有九明年某月日卜葬湖南雞鳴山之麓夫人嚴氏出同邑望族家素殷厚不好奢靡初歸府君時值生事稍落乃以勤德相更益充裕門內百口罔不宜之天性慈仁或聞傷人害物之事掩耳蹙額若將凂焉尤好施豫老而彌篤遇有乞貸者盡脫簮珥不吝先祖少傅公性至孝見簮珥有缺輒備具以奉未幾復舉以賑施親鄰中傳之以為美談至其見理明白不惑邪妄則有人所不能及者初曽祖沒先祖卜葬湖南雅不信風水之說鄉人有術士耻不售乘間醜為危言冀夫人惑之而先祖不敢違夫人毅然斥之曰既葬矣庸何改耶其人慙而退後亦竟無他也夫人生洪武癸丑十月二十四日卒天順庚辰十月十有六日夀八十有八明年某月日合葬焉子三人長曰瓊次即先祖諱瑩厯光祿署丞調福建布政司都事今贈光祿大夫柱國少傅兼太于太傅禮部尚書武英殿大學士次曰泯女一人適同邑陳禮廣東左布政使雲鵬之叔父也孫男十一人浣澤次即先考諱恩纍封右春坊右諭德今贈光祿大夫柱國少傅兼太子太傅禮部尚書武英殿大學士次溢滔瀚經綱紀綸繼女四人適汪闕諸詵潘府胡鏜府今為廣東按察司提學副使曽孫男三十一人邇次即不肖道逵選贈翰林院編修迅述吏部聽選官暹逾逑迪兵部武選司員外郎遴巡逡遒遡通達遨遲遇逈迵迂運延近適逸徑過邑庠生女四人適宋闕李潮韓煉徐暘𤣥孫男女未可數計兹不贅列竊惟曽祖考妣積德纍仁以遺休于後先祖初官光祿有貤封之典而竟不遂抱恨終天遷今仰藉餘廕幸獲追贈三代庶可伸先祖之志稽諸典禮謂當立碑墓道乃不自量敢以干執事倘蒙不鄙俯賜一言則光被泉壤感激當何如也抑曽祖考妣平生善行甚多顧去世已逺遷復顓蒙無知不能詳述苐托其聞于長老者如此伏惟髙明採擇正德丙寅仲夏穀旦歸田稿卷二
