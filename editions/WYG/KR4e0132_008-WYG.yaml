body:
  text: 歸田稿巻八明謝遷撰七言古詩鷹為楊仲謹題長風怒號振林薄黒鷹殺氣騰寥廓妖狐奉頭草間死靈鵲高枝仍噪喜亦知搏擊輸鷹鸇毰毸老鶴徒乘軒紛紛狐䑕競當路白日欺人况遲暮秋來那得一鷹擊我見此圖三歎息楊栁青直沽南頭楊栁青昔時楊栁今凋零霜風滿地散黄葉河邊索寞雙郵亭人道垂楊管離别南來北往競攀折我來袖手憐枯枝躑躅臨河駐旌節五雲回首懐漢宫丹楓轉眼經霜空李梅冬實豈佳味垂涎奔走嗤狂童陽回萬物自生色斡旋造化慚無力百年心跡歳寒同郤憶南山舊松栢食鮮魚有感我家舊住東海濵盤餐市逺惟鮮鱗腐儒粗糲自安分筵前不慕羅竒珍十年謬竊黄扉禄堂膳虛叨大官肉太牢滋味違賤腸翻憶魚􅃵常不足秋風蕭瑟吹蚤寒蓴鱸野興歸張翰鹽梅調劑邈無効廻思鼎耳殊汗顔江湖悠悠隔霄漢從今取足魚􅃵飯食芹知美敢忘君欲獻無由發長歎和兩峯懐西湖之作武林城西山遶湖湖山曽駐南宋都偏安風景已陳跡只今一統歸皇圖太平勝槩畵圖裏楊栁風輕杏花雨蘇堤虹臥聨六橋歌吹聲中紛士女孤山雪後寒梅香岳墳愁怨啼黄鴦湖山主人逺分閫兩峯回首思茫茫吾生乆已辭金馬幽懐毎在孤山下湖船唱和待公歸我願低頭拜東野和雪湖觀打魚有感之作用杜韻雪湖渺渺通江津湖波漭瀁光翻銀就中疑有蛟龍窟沉潜豈復論纎鱗亢陽經秋澤欲竭海鄉魚工竗入神長又密網倐來集湖堤十里浮埃塵渭濵老翁方鼓刀旁觀袖手雙肩高非熊不慕後車載乾坤只恐名難逃斷金從來兩心一静裏秋風愛蕭瑟湖山舊遊更誰在相伴漁樵莫相失汪進之通判瑞芝堂次李西涯韻竹忩不是悠悠者肥遯當年在荒野墓田靈芝出九莖瑞應從天豈云假傳家舊富五車書賢郎蚤躡青雲衢閭門駟馬當漢盛高山深谷非秦餘白髪蕭蕭老彌壯木假三峯儼相向芝莖移置中峯前旭日光生畵堂上新安世家世所無芝蘭奕葉千百徒頗聞餘慶自疇昔信知積善真良圖階下孫枝更竒秀京兆錦衣歸白晝翁今已矣堂巋然且捧霞觴獻慈夀進之乃翁已故母夫人在堂故云和雪湖雪中見懐長句澥天剛風吹霰雪澥壖静晝潮聲澈逺村煙樹影明滅寂寞江湖斷魚鼈閉門縮首避寒冽對酒高歌睡盂缺念及疲癃心尚切調爕當年慚就列遭際風雲敢容悦舊隠歸來山嶻嵲秋風門巷懸我轄知己相逄憐乆别握手歡顔溢眉睫王陽畏途輕九折往事經心耳猶熱稽康有書交未絶再續前盟忘蹇劣歳寒來往兩山窟雪磴雲崖自天設橘中樂事龍縞襪卒歳優㳺共丹穴阻風夜泊鄭家口黒雲匝地風怒號河流突兀翻波濤輕㠶大櫓不得展舟師撑拄惟長篙長空㝠㝠飛鳥絶村墟煙火俱蕭條郵亭隠見鄭家口泊舟倉卒横塘坳前途伴侣旋相失挑燈撾鼓煩頻招燈前呼兒具尊酒胸中磊磈差可澆狂歌一醉且高枕征途逆旅隨所遭天工隂晴亦叵測摩娑醉眼看明朝風恬日出波浪静一息千里真鴻毛浮生行止毎如此客心何用空焦勞葡萄西𤓰饋雪湖辱示長句次韻答之徑路草深客稀過衡門晝掩成獨坐披襟散髪傲羲皇舞鶴鳴琴代賔佐山中自詫擬封君木奴千頭竹萬箇圃蔬園果逐時新獻納從公無小大葡萄𤓰種俱西來憶從博望天荒破清芬不用自煎茶佳境寕論倒餐蔗氷盆滿泛恣浮沉廣席敷陳愜尊斚分甘聊復惓同心兩地遙知共清暇斜封博取玉川歌陽春調高真寡和效顰吾已忘妍媸白戰今仍勵慵惰東西十里隔山城往來郤媿郵筒荷疊前韻答雪湖浮雲變態眼前過曲肱晝眠伸脚坐許身翻笑平生愚濟時欲跂商周佐十年綸閣誤遭逄百技無能空一箇乞骸幸遂歸田園種種顛毛成老大海鄉荒僻乏温湯六月中旬𤓰始破葡萄帶雨亦垂垂色映明珠漿比蔗適意聊充席上珍薦客還傾掌中斚獻芹率爾嗤野人咏物知公有餘暇村柈粗糲勞品題一唱朱絃况三和凉州茍得真可羞東陵自鋤吾敢惰清狂更詫農圃師細雨長鑱時復荷雪湖和章疊至家僮遞詩往來頗廢農業戯用前韻嘲之永夏炎蒸不得過白晝困眠宵起坐井梧一夕報新秋少昊司天蓐收佐羲和平秩正西成禾黍離離實箇箇老農比屋動歡聲有年特筆當書大追思往歳凶且饑十室空虚九家破草根木葉俱充腸誰信苦荼甘比蔗老我歸來傷里鄰賀客登門廢杯斚商家霖雨慚罔功青州糜粥殊無暇今年幸復際昌期一曲昇平笑相和昔聞丈人譏仲由五榖不分四體惰奚童遞詩姑息肩穜稑登場忙負荷又用雪湖韻寫懐一首懸崖欲斷青溪過石上高眠醒來坐泉聲到處玉琮琤舉觴不用笙簧佐人言佳境欠茅亭紫翠中間著一箇箇中適趣僅容膝傲睨乾坤不知大曲徑斜通花木深虚忩洞啓烟嵐破暗香踈影月中梅玉液瓊漿雨餘蔗時呼野鶴上軒除旋摘園蔬薦賔斚秋來豐樂如有期老去宜休信多暇高文寧愧北山移清唱聊隨東郭和牛屯牧處芳草多舊日生涯未容惰如今亭上望牛屯蓑笠無勞雨中荷和雪湖喜雨長句用舊韻夢中驚聞雨來過攬衣夜興冠而坐渴腸頓慰真如甦簷聲况有清風佐黄童白叟競喧呼好懐豈直予一箇斡旋始信帝力存霑濡何必雷聲大祁祁霢霂連三朝風條不鳴塊不破向來酷旱將十旬禾黍皆茅荼亦蔗炎埃蔽空迷咫尺掘井求泉論杯斚桔橰密比徒爾忙銍鏄高懸總成暇喣沫可憐魚盡枯鳴垤終聞鸛相和秋深場圃俱已空雨後來牟豈容惰殷勤杖䇿告鄉鄰木柄長鑱亟須荷安平鎮追頌先帝治水之功也黄河夜决荆隆日馮夷怒逐天呉吼洪流洶湧奔張秋長堤一掃津吏愁波濤入海運渠竭南來北往舟航絶下流昏墊尤可傷多少蒼生侣魚鼈奏書星馳揷雙羽宵衣旰食厪當宁大寮承命合分憂夙夜經營靡寧處丁夫百萬如蟻集連延市鎮成聚邑皇仁惻怛重勞民詔㫖丁寧戒毋急四方畚鍤真子來伐石捲埽聲喧豗不須沉玉媚河伯堤完倐忽功竒哉𤣥圭告成自天錫百神効靈人効職安平再續神禹績萬歳千秋歌聖德宴鎮越堂酬錢二守石㠶如揚石傘張鑑湖萬頃雲微茫龍山中盤據竒勝巍堂鎮此神仙鄉懸崖千尺濺飛溜清渠九曲流羽觴華筵高㑹總冠冕文如滕閣來三王道同賔主意真洽坐深爾汝形相忘良辰况直時雨霽東風扇煖呈農祥陽春有脚沛膏澤霑濡合郡殊汪洋嘉賔滿座成燕喜主人令德宜龍光落花紛紛石墀淺爐烟裊裊春晝長樓臺倒影日欲晩觥籌交錯情未央酒酣起舞為君祝丈夫勲業銘旂常歳旱誰當作霖雨濟川自古須舟航福星不獨炤吾郡窮簷蔀屋俱彷徉次韻為雪湖夀母碧桃花殷爛錦堆洞門夾徑通榆槐高堂㺯孫飴滿頦夀筵尊爼方規恢海鮮嘉味雜鯸鮐軒墀舞鶴霜毰毸八荒夀域自天開背萱日煖根重培青雲甲第近蓬萊彩霞屏障時低徊滿堂賔客皆仙才傳書青鳥晨初回王母駕自瑤池隈最後劉阮由天台南山當户碧崴嵬作朋三夀非今纔承顔萊子戯學孩上堂詐跌還持杯隊舞諸孫紛後陪獻笑或作方朔詼繁絃急管喧春雷賔筵末坐遲我來鶴南飛曲塤箎偕不須投轄銜自駘為君倒盡先春醅天瓢願借添金罍從今一歳來一廻次韻咏芍藥酬雪湖春來玩芳浩無盡凌亂穠華與時競最憐紅藥殿餘春當堦凝露埃塵净林塘一逕斜通幽煖風扇動烟霧收佳人懶粧日高起翻身欲舞低含羞翠鈿歩搖紛可撮霞佩玲瓏欲霏屑未須金帶圍已竒獨占瑤臺地尤絶養花天氣隂復晴緗簾半捲虚忩明玉缸春酒舌不飲蔗漿茗椀真雙清君家池舘舊分種兩地相望人比重酒盃無分亦頗同花前想見吟肩聳看花莫論媸與妍閒中適意俱悠然夏蓮秋菊各隨偶對景且復陶餘年花開花落等閒過世事如花漫高臥賞心無惜杖藜頻君若歌時我來和和雪湖題史都憲墨竹長句虎頭猛氣摧强敵八陣雄圖歸畵筆醉墨淋漓恣揮灑俗塵未許輕相逼雪湖自號太痩生高誼直薄秋雲横吟肩雙聳碧峯立長歌時出摩空聲兩公詩畵非茍作延平寳劍成對躍風恬波静朝雨晴匣中隠隠猶雷鳴庖丁游刃有餘地目無全牛輕一世鳴球戞擊互鏗鏘恍疑韶濩陳廟堂嗟余飽飯惟捧腹百事忙然痴睡足世間巧拙未須論䄂手旁觀真碌碌歳寒三友梅竹松氷霜節操由來同孤山徂徠邈何許蕭蕭淇澳生秋風眼前物色自分曉世情郤愛春楊栁安得妙手添松梅著與修篁共堅守魏侯寶此長如新琅玕珠玉爭嶙峋高堂相對亦自勵要使清風動海垠歸田稿巻八
