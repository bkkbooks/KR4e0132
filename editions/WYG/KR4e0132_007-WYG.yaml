body:
  text: 歸田稿巻七明謝遷撰七言律詩贈伍主事全監𣙜場事竣還京寂寞山村獨養疴遙聞還斾欲如何斯文契誼更三世岐路離情寄一歌報國惟應寛稅𣙜承家端不忝賢科椿庭念舊如相問為道殘衰兩鬢皤次雪湖韻挽華廷禧少叅文星忽墜夜猿驚哀些憑誰寄此情青眼雲霄成夙契白頭林壑負前盟薇垣人頌氷霜操梓里家傳月旦評望斷龍泉空淚眼微茫江樹暮雲横贈方司訓考績之京用雪湖韻家聲自昔重秋崖管領文風到海涯道企蘇湖分教範學宗洙泗得心齋門墻人已誇多士干羽時方舞兩階久識囊錐今脫頴陽闗聊復寓離懐烟霞深處舊丹崖老我歸休汝水涯司教適當淹敝邑論文時枉過荒齋興來高論風生座醉後狂歌月上階岐路悠悠真念别好音何日慰吾懐睡起二首信手拈書倦即休清茶白飯更何求一鳴不悔當頭斥百鍊那堪遶指柔霜鬢毎憐青鏡曉雪心真愛碧山秋臨池魚樂相忘乆郤笑敲針作釣鈎端居亦自笑痴頑飽食無營只看山長豆莢肥供茗椀老藤隂密䕶柴闗坐來水閣忘三伏逄著仙人說九還佳境到頭人未識黒甜一枕醉醒間納凉炎天何地著衰翁竹裡空堂一榻風露渚光揺螢綴草月林影亂鵲驚叢臥看星斗揮輕箑渴憶溪泉喚小童忽聴鄰雞狂起舞奮身欲上廣寒宫待月林間何事月來遲三五清光未便虧雲漢已横天北極氷輪猶隔海東涯凭欄誰是同心者把酒吾當一問之江上有鯨長幾許今宵不讓謫仙騎夜坐二首桐㡌棕鞵舊葛裳閒來心地倍清凉𠖇搜自喜身猶徤露坐寧知夜未央塞上老翁誰得馬世間岐路總亡羊多情最愛青天月穿透踈林直到床老天還我舊烟霞信道吾生自有涯佳客不來頻掃榻好山難致即移家半忩細雨千竿竹十畝晴雲五色𤓰月滿平湖天共逺擬乘清興泛仙槎甃厓試移頑石補頺厓四角寛平愜素懐真境且􅂸供潦倒俗縁何苦費安排竹須畧洗通幽徑草不全除䕶淺階問道丹邱更何有箇中風月已無涯夜起夢騰繐帳奈蚉雷更覺輕風忽逺來聲在樹間秋信蚤漏當夜半斗杓囘蓮乘玉井新分葉露憶金莖舊賜盃起坐空亭清不寐半輪山月共徘徊池上二首風吹細浪碧粼粼水靣微凉透葛巾何處更尋三島路此心頓洗十年塵不嫌鷺宿移蓮近為愛魚肥喚草頻興到一樽成獨酌待邀明月作嘉賔脱巾露髪坐臨池波底流星又一竒皓月不來如索價好風能至亦催詩舟常倚棹懐安道琴不調絃待子期郤恨掛冠猶欠蚤清歡須及未衰時酷暑歎漠漠炎埃障大荒火輪停午晝偏長科頭竟日真如醉赤脚層氷未當狂强學地仙揮羽扇為迎田父倒荷裳桔橰聲裡心猶渴安得天風送雨凉晝寢萬國紅爐苦藴隆故人無處覔清風虚忩且寄陶潜傲朽木何妨宰我同閉户怕誰驚夢醒脱巾翻自愛頭童起來渴吻思鯨吸便向前溪采碧筒晩歩沿流歩屧漫尋凉目送漁舟帶夕陽緑樹森踈重掃石碧流清淺試褰裳炎埃羃地歸牛喘暝色穿林宿鳥忙忽憶馭風凌倒景短笻直上最高岡聴鶯長夏幽居睡起遲緑隂何處囀黄鸝塵針俗砭誰能識斗酒雙柑我自持妙手只輸摩詰畵高懐且和少陵詩老來真得山林趣謾説蕭韶叶鳯儀習静二首一塵不到水邊亭掃石焚香晝掩扄方沼萍開魚掉尾高崖松動鶴梳翎忩臨絶澗涵虚白山隔重湖送逺青更是晩來羣動息空庭仰臥數流星古崖隂翳竹間藤箕踞空堂枕曲肱不耐塵容囘俗客獨餘衰鬢媿禪僧神遊碧落虚乘鶴興到清漪試采菱報道海田𤓰又熟滿前真對玉壺氷覺衰右臂加酸搦管難重揩昬睫歎衰殘門無車轍宜酣睡飯有魚􅃵亦强餐霜鬢向秋深漸白葵心傾日晩尤丹好懐多謝東鄰叟斗酒相過且盡歡偶興曲徑踈籬擁薜蘿晩風紅落豆花多南山夜半牛堪飯東海門深雀自羅遺恨未酬三顧寵清商誰解五噫歌漫将舊硯臨池洗莫遣餘生待墨磨憂旱竒峯旋復散炎颷抱甕沿溪歎沃焦生怪亂螢依腐草更堪多莠壓良苖炎威入夜愁雲漢凉意先秋跂斗杓欲挽長江媿無力憑誰一滴借天瓢筆餽雪湖辱佳咏依韻奉答管生聊遣直文房小竹皮冠舊羽裳光藉剡川澄素練香分蟾窟搗𤣥霜憑誰較藝論工拙未許齊肩競短長莫笑中書君已老曽隨鵷鷺入班行聞蟬山下孤村緑樹稠新蟬處處競號秋吾方幸與塵相逺爾若不鳴山更幽飲露吸風宜自足縁枝抱葉復何求阿翁真愛華胥境午睡酣時可暫休鳥聲吾愛吾廬鳥亦忻好音時復送殷勤數聲出谷眠初醒巧弄當筵酒半醺細和石泉流𤨏碎緩隨山靄度氤氲閒情總是傷春後猶勝寒蛩四壁聞憫稼離離禾黍正懐新可奈炎颷作態頻聲斷桔橰空入夜望窮阡陌總浮塵焦枯物色將秋際憔悴民生况海濵且復殷勤慰閭巷桑林有禱格蒼旻新月火雲飛盡火星流忽見清霄月一鈎斜落酒尊如解飲稍穿房户亦尋幽清光微引金風動皓魄低㴠玉露浮便欲脱巾相對酌不堪衰鬢影蕭颼七夕立秋七夕人間值立秋斗杓回指火西流乍聞細雨隨風至頓覺炎埃匝地浮老我憂懐忘就枕何人乞巧競登樓天公肯借銀河水一洗閭閻旱暵愁新秋即事懐雪湖晩風細細雨踈踈為報新秋入井梧最喜鬰蒸如暫解猶憐枯槁未全甦吟肩企逺勞雙聳坐榻便凉學半趺軒從乘閒能一過豈無白飯與青芻望雨人言秋雨傍雲生望雨瞻雲眼倍明觸石片時如有意浥塵數㸃更無聲深淵叵奈龍痴睡高垤空聞鸛獨鳴寂寞傅巖何處是坐來懐古不勝情秋凉郊墟一夕動新凉蟋蟀聲多近我床風度踈松将入室露零蔓草欲沾裳槎浮漸覺星河近銍又猶憐里巷忙燈火簡編妨老眼忩前惆悵舊螢囊虹見海濵枯悴到山顛赫日炎炎類火然微雨方将沾下土妖虹忽復亘南天來蘇愈渴蒼生望斬伐誰司白帝權怒髪上衝冠欲裂胸中長劍倚空懸培芋平疇滿眼盡枯荄尤向山中惜芋魁翠葉翻雲能自庇赤心承露且加培全收敢望三秋富茍活須憑一雨來分付家僮勤著力歳寒還我地爐煨微雨暮雨如絲浥旱塵歡聲也復動比鄰未論潤及禾苖逺且喜凉生枕簟新霡霂有功潛入夜鬰攸為虐動經旬老天若慰雲霓望一夕滂沱遍海垠農歌犖确聲頻歎桔橰農歌幾處競啾嘈力勤總為旱來苦響答遙聞夜轉高俚語鄉音皆入調炎風烈日敢忘勞康衢擊壤風寥邈漫采新腔續楚騷聴琴聨句贈允恭二尹載鼔瑤琴見故情馮相逄青眼倍分明采芳正憶猗蘭逺謝感舊尤憐别鶴清流水高山千古意馮玉壺氷壑一鄉評杏庄重結新蓮社謝嵗晩頻過不負盟馮湖亭清晝水雲深謝風月幽懐托素琴思逺忽驚秋鴈過馮調高真訝海龍吟紅塵蚤識焦桐尾謝皓首重聞大雅音短句贈君慚白雪馮悠然坐對碧山岑謝新穫山秔秋蚤熟黄雲側耳歡聲此乍聞豐樂未酬鄉社願新嘗聊慰老農勤撫時空自懐賙恤思孝先應薦苾芬更辦分毫了官稅田間一飯敢忘君放魚涸澤空憐喣沫頻盆池尚可活纎鱗惠施亦未知莊叟子産何當信校人待决西江應入肆逺懐東海漫垂綸臨淵坐對悠然境一躍萍開爽氣新喜雨二首雨來秋後苦嫌遲猶勝秋前不雨時炎熇障天愁漠漠焦枯被野歎離離蹄涔先慰牛羊渴秕穟聊充老稚饑霖雨豐年乖夙志悲歡隨衆亦何為夜聴簷溜到天明喜見陂塘水漸生芽甲旋萌枯菜色笙歌忽動渴蛙聲老農簔笠經時廢野渡舟航向曉横為語鄰翁好相慶晩禾猶望一分成憫歳二首憂時長自祝年豐造化霑濡苦未公白露已零猶渴雨青苖欲秀蚤摧風預憐官府催科拙坐見閭閻杼軸空道與觀風諸使者好将民瘼逹宸聰脫郤朝簮學老農海鄉無奈歳頻凶眼看多稼秋乾死夢駭洪濤夜怒衝雲漢仰瞻天萬里風茅驚捲屋三重先憂心在知無補辟糓惟應伴赤松中秋晴霽已而風雨驟作次雪湖韻散盡秋隂更晩晴天公似亦解人情廣寒宫闕依然逈近水樓臺分外明丹桂逺移巖壑影素娥虚度珮環聲青樽肯負今宵約風月平分有舊盟玩月山堂正喜晴怪風吹雨忽無情一尊傾倒初分夜萬壑隂森直到明摧偃忍看禾稼色怒號驚訝海潮聲來年預禱中秋節莫更豐隆敗我盟和雪湖登高之作秋入西山爽氣回欲酬佳節共登臺酒須客至方當熟菊待詩催故晩開星聚毎煩占㑹老時違端合賦歸來白頭强徤䝉天假郤笑星星負此杯采芳尋勝歩紆廻四靣林巒百尺臺花下一尊仍對酌竹間三徑為誰開南山晩色悠然見北鴈秋聲驀地來忽憶楚騷増舊感高歌激烈且停杯寄和西涯守歳韻換郤􅊝符净掃塵衰顔喜色動先春守除夜覺寒更永履㤗朝迎淑氣新歳月駸駸将奈老乾坤納納茍容身有懐朋舊從頭數湖海晨星得幾人悼黄廷璽太宰宦轍歸來各病鄉病鄉聞訃倍心傷哀歌强續招魂些嘉話徒懐㑹老堂行見秋原荒宿草可憐寒月落空梁雞壇舊契今餘幾一束生芻淚兩行雪湖山庄雅集次韻時方即席家下忽報屈二守及門遂不及盡歡而别林閣頻煩折簡招午風村郭酒旗飄白連雲谷秋光老紅入霜林霽景饒洛社舊遊増勝槩楚壇餘勇植高標無端又作匆匆别追憶清歡悶未消風雨夜宿山庄懐雪湖夜忩風雨送清寒老眼昬燈展巻難木榻擁氊供瞌睡地爐煨芋當加餐鴻鈞又喜陽來復鳯歴俄驚嵗欲闌相約尋梅妨路滑聊憑尺牘問平安元旦紀興次雪湖韻郊居忽漫入新年老去襟懐益澹然三島晴霞瀕海曙一犁春雨傍湖田村醪獻夀聊相慰野服迎賔取自便獨奈沉隂妨賀轍願瞻旭日麗中天新正苦雨用前韻寫懐閭里凶灾憶舊年又驚物候轉悽然積隂猶蔽三陽日霪潦重傷二麥田比屋羣嗟真耳熟一餐獨飽豈心便農祥懸望新春後時雨時暘共荷天立春前一日大雪用前韻志喜過郤殘年望有年曉來驚喜雪紛然先春一日猶成瑞瀕海羣黎快力田木屑火温憨睡足梅花春細苦吟便扁舟忽動王猷興郤怕篙工又怨天春雪不已用前韻答雪湖見懐二首舊聞春雪兆豐年雪更彌旬思黯然且向寒爐需茗椀漫勞夙駕税桑田閉門高臥宜衰晩抱膝長吟覺静便想見青陽方婉娩晴來即是賞花天雪夜圍爐又隔年撫時懐舊獨醒然詩情毎共尊前燭農話惟勤雨後田海底魚龍猶自蟄山間松檜乆相便尋春重負湖船約目斷城西欲暮天苦雨歎仍用前韻老來學稼不逄年灾沴頻仍毎愴然八月颶風真立海一春霪雨又漫田㸑愁烟塞薪尤急行奈泥深屐未便瞻望晴曦何處在排雲直欲見青天喜晴用前韻柬雪湖雨忩悶坐晝如年忽覩晴光獨快然波蘸長楊黄苒苒風牽荇帶翠田田谷嵐溪漲時俱勝畵舫籃輿意總便明日尋芳成舊約詠歸同樂舞雩天湖庄小集次雪湖韻陽和一脉洊來還兩眺亭臺紫翠間楊栁巷通山北垞木蘭舟倚水西灣風光總是三春好世路誰如二老閒東作又興方入念閭閻稼穡舊知艱疊前韻酬雪湖短楫輕風午釣還數聲欵乃水雲間碧含香露桃千樹翠抹晴烟栁一灣藉草醉眠芳徑穏臨流坐對浴鳬閒探春直到山深處自詫躋攀力未艱再疊前韻酬雪湖鄰蝶過墻忽復還杖藜吾亦憇花間新篁倚石通幽徑宿鷺窺魚占淺灣對景乍疑春事蚤玩芳真愛老身閒郢中清唱仍須和頗奈癯翁韻險艱酬雪湖雨中見懐仍前韻悶懐仍逐雨聲還淅瀝虚簷醉夢間村牧路迷寒荷笠海艘㠶重暮歸灣湖添水色思君逺忩掩梨花伴我閒乘興欲尋雙短屐出門預恐踏泥艱山庄候雪湖不至用前韻奉懐坐看孤雲載鶴還夕陽倒影在林間雨深草色斜侵徑蛙雜春聲閙隔灣歳月無情空歎老溪山有約且乗閒誰言命駕輕千里咫尺猶憐㑹晤艱山亭獨坐用前韻遣興四首白雲生處一僧還清磬泠泠杳靄間蜂採野花歸洞窟鹿尋芳草過溪灣眼前往事真成夢身外浮名得自閒吾愛吾廬春睡足逄人漫說畏途艱慣客家童貰酒還酒旗搖