九廟神靈享吉蠲夏俊克知三有宅華封遙祝萬斯年林泉幸遂容衰老願效王褒頌得賢老去成都有薄田優㳺殘喘頼蒼天江湖萬里雲霄逈草木經春雨露偏肘後方傳丹藥劑閒中興在白鷗篇力田已荷蠲租詔但願頻書大有年壬午新正次南山韻逝水年光不解愁芒鞵竹杖稱嬉遊湖山許我成三益海屋憑誰下一籌棋局坐觀長袖手詩壇端拜合低頭新年謝郤門前客怪見兒童蹴戯毬靳二守昆仲文武聨科季方韜畧懋家傳伯氏文塲得雋先宦路齊驅如異轍賢科相望亦同年二難濟美成金玉一代流芳炤簡編聖主求才真側席䇿勲擬共上凌烟送陳子新會試南宫南都奪得錦標歸秋桂香生戯彩衣丹穴舊巢雛鳯起太邱華閥德星輝十年燈火心良苦萬里雲霄願不違禮樂專門吾邑盛㨗音佇聴冠春闈癸未新正寫懐二首百年虚度四之三往事悠悠祗自慚林下身輕猶健歩口中舌在足清談浮生漫訝星霜改大造真承雨露覃苦憶舊時行樂伴舞雩何處試春衫荒陬殘臘煖如春共道春來萬象新入夜剛風仍作雪崇朝寒氣苦侵人六花如兆豐年瑞四海猶憐蔀屋貧安得重隂都散盡仰瞻旭日麗蒼旻和馮炯之燈夕感懐用前韻兒童兩兩復三三奔走如狂也不慚街火巷燈迎淑氣山歌野曲間鄉談太平有象春光蚤荒歉無虞聖化覃老我閉門高臥穏夜遊仍恐露霑衫萬方民物正同春元夕燈輝又一新未許少年欺老者須知古月炤今人歡騰里巷時開泰業在燈忩道濟貧猶子㷀㷀須寄語好将苦志答穹旻又和炯之哭母之作仍前韻流年三十又加三先母夫人棄背三十又三年矣禄養心違痛負慚風木夜添烏鳥恨門墻人廢蓼莪談孝思漸覺餘齡短封誥重孤沛澤覃舊感為君増百倍不知清淚濕衣衫背萱憔悴乍逄春舊恨知君與歳新時序倐更鑚燧火陽和如慰寝苫人顯揚志逺終移孝菑穫功深不患貧况是德門流慶澤未須號泣上呼旻王指揮驅逐妖僧馮炯之有詩美之因次其韻海内于今聖治崇遐陬將領亦承風妖魔逺出郊闗外正氣全歸號令中保障不孤千里託戡除寧論一時功牙旗風颭轅門静坐對葵心向日紅桐湖逸墅為邵文實方伯作何事薇垣蚤乞身﨑嶇世路覺勞神野花幽草新門徑曲水崇山舊主賔臥看閒雲歸洞口歩隨馴鶴遶湖濵扁舟許我時來往林下相望兩逸人梁掌教被旌奨吾從弟進過索詩為和因賦一律桂籍登名逺紹芳黌宫馳譽稱明揚士林清論真無忝吾邑斯文倍有光泮水正逄春浩蕩雲霄佇見鳯翺翔呉興榱桷今方盛次第先應取棟梁松石為詹司訓作蒼松偃蹇石嶙峋石壁松隂接四鄰雲外采苓隨處足夜深待月坐來頻空林猿鶴盟如舊晩歳氷霜意更真只恐明堂需大用未容歸老著閒身次韻寄林見素司冦領䄂真宜壓縉紳旌旄忽訝逺楓宸懸車門舊歸耆德借劍名高懾佞臣未老見幾仍及蚤先憂抗䟽不嫌頻雲莊穏臥加餐飯珍重平生抱道身一激頺波大有功滔滔皆是古來同心懸魏闕猷仍壮興在孤山句倍工宦路金蘭懐夙昔鄉闗雲樹悵南東白頭晤語知無地短札因風托便鴻送陳甥章之任四川鹽課副提舉鄉里高門重太邱簮纓新喜紹前修漢鹺出井真良法蜀道登天亦壮遊晝錦親庭歸便驛秋江客棹趂安流守官願爾清如水佇聴嘉聲慰白頭次韻答守谿見懐懐人心渴類相如轉盻光隂又一初栗里歸休嗟别路承明宿直記同廬昌期幸際千年㑹優禮均沾五色書歡晤何時償舊約暮雲春樹立躊躇夀同年范以貞太守八十天台深處集羣仙重慶堂高啓夀筵洞口蟠桃春爛熳庭前舞鶴晝蹁躚閒情都付耆英㑹遺愛猶歌太守賢悵望雲山寄遙祝故情誰似老同年次韻答憲副弟二首自慚衰朽負明時三徑閒情酒一巵棣蕚依稀真念别鴈聲嘹嚦强裁詩忠貞為國年猶壮清白傳家夙所期翹首雲衢千萬里要看竹帛令名垂杜郤衡門幸茍安不煩臨鏡歎衰顔好懐都屬耆英社往事真過夢覺闗乘興有時行伴鶴支頥長日臥看山光前業付吾難弟廣厦仍須庇萬間哭王守谿少傅白頭交誼幾人全莫逆襟期五十年海内乆知人仰德天顔曽喜我推賢某常因乞休舉公及匏菴自代甚見嘉納呉門望斷春天樹剡水懐孤雪夜船一束生芻兩行淚長歌楚些益悽然鄭氏雙節堂有序宗祊如綫泣遺孤苦志相承婦與姑千仞雪松依石壁一輪秋月浸氷壺慶源已萃賢孫子風節真勝大丈夫鸞誥推封行有日潛光終見耀寰區吾浙左方伯鄭公示予雙節堂集葢皆一時縉紳頌其曽祖母祝祖母劉貞節之作也予讀之三歎不能已夫自世教衰篤行全節求之簮纓圭組之流不可多得况閨門弱質乎又况一門兩世増光嫓美以貽慶于後者乎方伯公志節凝峻為時所推重其來固有自乎表厥宅里以旌淑德朝廷令典也而當時缺焉向非斯集之作将遂泯然無傳矣有司者亦安所逃其責乎今方伯公駸駸大用推封上及指日可待則夫幽潜之發匪直斯集而已寧復有餘憾乎予衰耄筆硯乆荒覩兹盛美又素心所樂道者故勉贅一詩且為題其後永感為山隂吴大尹瀛作與其兄御史瀚同甲科椿萱凋謝不勝悲棣蕚相看兩泪垂昭代聨芳丹桂籍終天恨抱蓼莪詩栢臺花縣承先志鳯詔龍光慰永思信道德門流慶逺義方端不負當時何提學粹夫見訪獨掩衡門正養疴秋郊憲節忽來過多君古雅情如舊愧我迂踈鬢已皤是處英才霑化雨平生直道任風波一宵清話又成别握手臨岐可奈何贈何提學粹夫陞南京太常少卿之任邸報傳聞喜不勝于今公道尚分明雲衢逸足嗟淹滯禮寺清班屬老成故舊多情光敝里衰殘無路送行旌遐陬良晤知難再一曲驪駒百感并粹夫自翰林左遷久淹外服兹方以江浙提學擢南京太常少卿粹夫之過吾姚也辱顧予海濵藹然斯文故舊之情别去纔數日聞有超擢之命予既喜公道之乍明而又慨良晤之難再也作此贈之聊致區區惜别之意次韻許堯弼觀海一首渺渺鯨波漾海雲弱流三萬古來聞天連逺嶼㴠龍屈潮捲平沙起鴈羣蓬島路深思獨往紫霞餐足許誰分相逄忽動觀瀾興一曲滄浪漫和君東湖書院次劉東山大司馬韻為呉都憲廷舉作溪橋石磴往來通勝景依稀緑野同門對竹梧凝晩色山連亭榭領春風塵容駕斷重欄外玉屑談霏四座中試向源頭尋活水湖光溔瀁窅難窮絶澗縈廻萬壑通草堂真趣許誰同天開梧野空塵宇地接桃源尚古風絃誦忩虚聞月下漁樵路逈出雲中主人漫動思歸興憲節方當惠困窮嚴梅谷八十夀詩夀筵歡笑藹庭幃昨夜祥光動少微梅谷含芳娱晩景蘭階毓秀駐春輝寵承天上新封誥興在江邊舊釣磯桑梓故交今有幾為君聊賦鶴南飛稽山小隠為許世美作有序為耽山水逺移家遁跡稽山鏡水涯蘿徑屢更新歳月麻衣長伴舊烟霞一瓢飲足何當棄駟馬車高任自誇况得仙翁傳秘訣漫添宿火養丹砂鄉友許君世美移家稽山之隂有年矣因自號稽山小隠志欲避逺塵俗今其年踰七望八而翛然歩履强徤不衰真得隠逸之趣可嘉也故為作此以美之鄧憲副挽詩名名輔急流蚤計賦歸來夢入華胥竟不回塵沒可憐無價寳雲驤空羡出羣材年光冷落新香社門望巍峩舊憲臺我為故情歌楚些悲風蕭瑟動蒿萊憶松為崇德葉銀作喬松千尺比靈椿不見音容夢想頻華表依稀歸鶴唳白雲杳靄䕶龍鱗驚心漸覺氷霜老轉眼俄驚節序新最苦夜深風不定慈烏聲急倍傷神小兒垔贅韓宅忽報㺯璋喜而有作呈司冦親家東山衍慶藉安陽驚喜華緘報㺯璋幾夕熊羆頻入夢九霄奎璧燦呈祥新陽賸毓蘭階秀逺兆先占桂籍香小兒賛善謬主順天鄉試適有小録寄至故云勝日擬為湯餅㑹高軒顒望賁遐鄉贈詹司訓休致還建寧落花飛絮正紛紜三疊陽闗酒半醺世路古來輕宦轍離情今復重斯文門墻雨足新桃李囊篋風清舊典墳想見故園行樂地松間石上臥看雲自號松石寄陳汝玉都閫有序漕渠歸路憶聨舟轉盻俄驚二十秋老我山間虛歳月多君閫外富謀猷建牙舊重留都勢仗鉞真分聖主憂㑹際風雲頭尚墨佇看勲閥擅東甌陳都閫汝玉武而好文温雅詳慎為縉紳所推重正德丙寅冬予自京歸休汝玉時總浙漕竣事還並舟而南途次周旋者幾兩月辱以世契之故相與甚洽今忽忽二十年矣汝玉譽日隆遂自吾浙閫擢留都營帥予喜其大用有日勲業所就殆未可量也作此寄之用致期勉之意楚母太孺人挽詩有序花封善政由慈訓萊彩新歡慰逺思封誥擬承天寵渥訃音忽動邑人悲衰麻扶柩囊無物老穉攀轅路有碑衰病未能從執紼些詞聊為送靈輀吾邑宰西夏楚君國寳自寶坻推調來其母太孺人以道逺留京師久之今年春始就迎養太孺人有懿範君克承順其志愷悌得民實慈訓所及民咸頌其賢居數月太孺人疾作遂不起可哀也君今扶柩歸行李蕭然其亷又可知己今故為作此以悼之贈陳推府考績之京有序驪駒遙寄送行旌為念通家故舊情大郡明刑初奏績甲科高第蚤蜚聲江頭栁色離亭逈雨後波光驛棹輕比歳東南多水旱好將民隠逹承明杭府推陳君以名進士佐郡有賢聲兹既滿三載将上京奏最君以其兄全與吾子丕為同年也甚相厚故特為作此以贈其行哭晦菴先生詩忽漫暌違二十春驚聞哀訃倍傷神望窮雲樹馳情逺誼重金蘭入夢頻夀域幸同嘉靖日典刑俄失老成人榻前末命從公後追想當時淚滿巾送靳二守九載考績之京有序海鄉翹首望錢清無計攀轅奈爾行别駕獨賢諸邑頌斯文相與十年情碧波渺渺離懐逺岐路悠悠客感并超擢有期遙洗耳于今公道尚分明郡二守靳君元佐郡滿九載将奏最上京予病臥海濵辱顧念甚厚而不能一餞送悵惘何已因作此以贈其行君亷慎自持九載如一日而觀風者旌舉毎不及之予嘗為之不平也然公論有在終不能泯當必有不次之擢故于其行深致望焉別石崖弟方伯弟南兄北念分携怪底楊朱泣路岐潦水微茫烟樹杳海天寥廓鴈書遲嚴程未數憂先集殊遇難酬力已疲何日歸來遂初願一堂歡笑叶塤箎和邃翁老先生免朝志感一首黄扉晤語真如夢白首交盟尚未寒寵禮獨優公不忝明良相際古來難靖邊䇿試騰空劍華國文章㸃鐵丹宵旰于今憂正切爕調須致萬方安奉㫖免朝和邃翁老先生韻一首衰病不辭千里逺聖慈深念五更寒風雲慶㑹誰言晩天地恩私欲報難更化只今回泰運駐顔何處覔還丹乞骸仍合尋邱壑伴食終朝可自安和邃翁郊壇齋次一首禮重圓丘夜炳蕭齋宫旌斾四周遭官階何幸重聫珮契誼元同舊賜袍扈從班衣仙蹕逈祼将歩怯内壇高上台絶唱誰能和不獨詩稱一世豪和邃翁慶成宴一首九重更化正宵衣舜日光華萬國依大祀既成初錫宴羣工不醉未容歸塵空紫陌元宵届氣轉鴻鈞下土晞殿上鵷班忻接席江湖翻恨乆相違和羅峯郊壇韻一首馨香自古維明德夢卜于今得異才一代文章凌漢室百年靈秀萃天台内壇分獻神應格和氣流通春正來調爕付公須盡力亦知泰運自天開哭陳子陽詩一首江上維舟送我行靣顔憔悴已心驚離懐耿耿未終歳哀訃悠悠忽到京奕葉簮纓承世澤專門詩禮重鄉評百年遺恨松蘿託繼述猶應望兩甥和太醫蕭院判詩一首久矣心灰不復然京華重晤亦天縁舊遊落落憑誰語往事悠悠祗自憐藥力可能回老倒生涯何用問神仙乞骸又喜承殊渥歸思蒼忙旅鴈前和韻答邃翁二首詔憫衰殘特賜歸曉辭丹陛欲沾衣江湖老我憂仍切朋舊如公恨已稀池上聨班真不偶路岐握手又相違何當慰我瞻依渴短札長空有鴈飛出塞重聞開督府歸朝端合佐明堂白頭寵眷真竒遇丹扆敷陳總舊章羣䇿未容遺董賈九重直欲邁羲黄匆匆離合悲衰晩疇昔交情可易忘和韻答羅峯一首英傑方當承眷倚衰頽只合賦歸來鳯麟嘉瑞呈當世奎璧文光燭上台共道衣冠隨世泰即看鈞軸挽春回江頭契誼俄成别書札因風莫吝裁和韻答石門一首病骨自慚搔白首崇班何幸簉丹墀掇英曽喜紉蘭佩視草重來共硯池悵望鄉闗情獨逺廻瞻天闕歩仍遲致君堯舜今相付我已無能答聖慈南溪為徐望之作其人善小兒醫南溪真趣更如何四靣峯巒擁翠螺徑蘚雨深妨採藥屋茅風破漫牽蘿閉門絃誦知音少揷架方書活㓜多老興尋幽殊不淺藍輿特許為君過張御史具慶膺封聖朝大典重明倫柱史推封紫誥新夀儷椿萱真具美榮膺繡斧正行春臺端風采輕山嶽家慶歌聲合縉紳素志已酬何所祝願言移孝答皇仁夀姻家翁陳太守八十有序泮水南頭啓夀筵太邱遺澤勝綿延金章紫綬輕身外桂子蘭孫滿膝前椿樹根深纔八十蟠桃果實更三千馳情不特松蘿托猶憶芸忩共簡編太守陳公廷實予少嘗同筆硯遂締姻盟欽好至于今無替今公夀八秩值初度辰賔朋滿座而予以衰老居海濵獨不得持一觴稱夀情不能已聊賦此致區區之意次聨句韻有序軒車忽訝過江東高誼于今邁古風廿載故情千里隔連宵清話一尊同閒中歳月慚虚度眼底交遊覺漸空大拜有期頻洗耳聖明方自攬羣雄憶昔分携出禁城離懐長自重行行九天寵命膺方岳濵海旬宣枉斾旌報國君應酬素志問年吾已愧殘庚遐陬良㑹知難再竟日淹留不盡情錦夫方伯居京時辱與吾子丕同筆硯契愛甚篤自正德初暌違迄今二十有五年矣天各一方思欲一良晤不能得毎用耿耿兹方伯乃假旬宣之便枉顧予于海濵高情雅誼何可當也因次聫句韻二首以志感且用叙别但愧頃衰病之餘詞不足以逹意挽詩一首寫上徳初老年兄靈右同年三百零落殆盡紹興一郡僅存吾二人公今又棄我而先往矣奈何奈何悲哀之甚言不成章九原亦知之否歸來社㑹不嫌頻毎恨稽山隔海濵世業一經賢父子明廷三䇿舊天人蒲鞭遺愛黄堂逈錦誥加封白髪新同榜英賢零落盡病鄉聞訃倍傷神楊邃庵先生挽詩都門話别兩經年回首雲霄毎悵然宦轍論交今有幾江鄉㑹老竟無縁白頭督府猷仍壯黄閣温綸寵更偏塵世悠悠真一夢獨留殘稿續長編元夕病中寫懐天上歸來乆杜門生平心事與誰論衰殘伏枕還憂國强起含飴且㺯孫元夕華燈喧里巷新春淑氣滿乾坤追思朋舊今無幾何日相過倒一樽歸田稿巻七
