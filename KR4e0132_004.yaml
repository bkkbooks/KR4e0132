body:
  text: 歸田稿巻四明謝遷撰像讃類陳都閫像讃雅志詩書折衝尊爼名重縉紳威加行伍為國爪牙傳家簮組篤生賢孫克繩祖武轉餉有經粤維政譜萬艘一麾世澤斯溥嗚呼此其遺休餘烈猶兄起吾敬于瞻睹此吾浙都閫朴菴陳公遺像也公雖世承武弁而惇尚儒雅為縉紳所重予初登第時公方總浙漕来京每接其言論倐忽餘三十年公捐舘久矣而其孫汝玉克紹前烈復以都閫之節總漕事兹予謝事南歸適汝玉漕事竣獲與並舟而南間出公像示予感念存没不勝愴然敬為題此楊先生小像讃名池字一清學足以潤身而不飾其外才足以致用而不諧于時袖手静觀有眼空塵表之意掀髯髙詠或時出胸中之竒固宜鄉邦稱之為碩彦而子弟尊之為嚴師也歟自題野服行樂圖才乏經綸器非瑚璉意廣智疎量狹中淺幸際昌期濫叨盛選跡誤厠于廟廊榮謬膺夫軒冕固知小載不可以大受而綿力不足以致逺每臨事而兢惕恒捫心而懐赧徒追先皇之殊遇欲圖報塞而强免結舌之際持論侃侃匪躬之故遭時蹇蹇觸危機而罔恤當逆鋒而直犯豈見可而忘難惟以縮而自反向非聖明之䕶持盖將大僇之不免既䝉庥而瓦全亟奉頭而䑕竄寂寞之㘭寛閒之畈農圃是親麋鹿為伴茍藏拙而引恬因習閒而成散謝世路之紛華遂平生之疎懶肆川泳而林棲玩霞舒而雲惓振素衣于髙岡濯敝纓于清澗藉嘉䕃以夷猶求素心而徃返遵王路之平平履幽貞之坦坦内深省乎百愆徳敢忘乎一飯時歌咏夫太平聊優游吾衰晩東谷像讃充積之學見于文詞和粹之徳發于威儀才固足以致用志亦存乎濟時何聞譽蚤重于鄉邦而選舉竟詘于有司噫崑岡玉韞滄海珠遺實維輿論寧獨舊知豈天有意于後學故留此耆宿之師耶邵憲副先生像讃文實方伯之祖温温恭人謙謙君子是固其徳之厚也簉羽臺端蜚英翰苑抑又其才之茂也敭厯荐久偃蹇而休尤足見其端確之守也既豐其積乃嗇其施豈天將大昌其後也堂堂遺像端拜仰止是惟先光禄莫逆之舊而實吾鄉邦前軰縉紳之領袖也邵封官像讃文實方伯之父蚤閑庭訓無忝所生晩貽燕翼有美其承暢襟懐之坦夷谷空川曠偉儀觀之豐碩鵠峙鸞停笑傲優游雖卒老于泉石褒封赫奕終不失夫簮纓嗚呼斯人也其聖世之遺逸吾鄉之耆英也耶王文煥像讃蚤志存乎用世學亦勤乎明經豈賦命之不辰胡名乖于垂成既削跡于場屋遂寄傲于棋枰生不事夫産業惟優遊桑榆之景言不阿其所好抑庶幾月旦之評年幾大耄動若後生蚤暮善飯几杖靡憑人徒見其矍鑠或猶訝其寧馨不知胸次之蕭散直任性真之流行是誠無忝于三槐之華胄固宜時稱為四明之耆英銘類古愚齋銘吾邑張駐泊氏以醫名世守惇恪其聞孫曰淵字徳深尤白眉之良乃以古愚自號其志盖將紹先徳而矯頽俗可嘉也予故為銘其齋以朂之銘曰粤稽古初風氣未闢民生多愚其愚也直乃賦或偏匪貎斯飾渾然天真其宄安宅世降日汚淳風漸忒外貎若愚中心孔棘機巧横生奸偽百出舉世滔滔莫知其極維駐泊孫思紹潜徳業儒用醫居今稽昔抱仁以施活㓜是力劑不妄投方傳思邈藥不二價信慕康伯行類迂踈衷全隱惻曰愚自將繄古乃則古愚伊何厥初罔易絶慧棄智惇孚秉塞詘華去浮蹈悃履愊彼巧我拙彼佞我黙不徑不竇不逆不憶志則移山心靡轉石終日不違千慮一得是謂古愚允維矜式懋哉爾承永延世澤詞類戊寅臘月予幸七十初度同年王守谿少傅寄梁州序為夀依韻奉答茫茫江海悠悠昬旦歎惜年光易換迷途世故從來百様千般眼底翻雲覆雨狂浪頽波天也那能管白雲堆穩也與公眠吳越相望兩地仙傳雅調正家宴便當筵髙咏愁懐散賡一闋賽强徤守谿明年亦七十中秋後二日其初度也仍用前調一闋寄夀中秋前夕今辰初度萬里清光快覩香生叢桂廣寒真境清虚但見斗牛相映奎璧聨輝元是文章府洞庭深處好勝蓬壺青雀西來蚤寄書王母降玉娥舞笑鶴南飛曲吾來暮遥祝讃夀彭祖歸田稿巻四
