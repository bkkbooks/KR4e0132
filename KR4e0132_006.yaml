body:
  text: 歸田稿卷六明謝遷撰七言絶句南旺湖湖水南北分流以濟濟寧臨清諸閘其源出山東萊蕪諸泉永樂間上命尚書宋禮經營之漕路遂通始免海運之艱南旺湖通黑馬溝濟南汶北兩分流淵源直是徂徠出真重前人為國謀南北關河總會通泉流分濟恰當中供輸坐免鯨波險千載洪圖仰太宗舳艫銜尾轉儲胥閘溜垂虹接漕渠廟食龍王亦何事可憐湮沒宋尚書湖水經秋分外清順風南下片帆輕尋源不盡平生興翹首萊蕪詠濯纓北軒小飲次陳德孚韻二絶嫩緑園林雨後天漫開花塢會羣仙落紅不遣家童掃留取餘香薦客筵松醪春濺玉缸香喜洽親朋笑滿堂山雨似知留客意簷前向晚送微涼和陳德孚見懷絶句五首北忩人靜日從容臥看輕隂落澗松剩欲與君同採藥萬山深處白雲重擬慿大藥駐衰容蚤向山南植萬松未問茯苓今幾許眼前嬴得晝隂重平生不耐抗塵容興在清溪石上松郤喜年來人事少衡門晝掩底須重數畝山居膝可容老龍鱗甲手栽松茅亭正在雲深處長夏隂隂紫翠重靣靣溪山列秀容鹿眠芳草鶴巢松登臨不倦時乘興直上雲峯十二重題相如題柱圖凌雲氣槩欲何如萬里橋邊駟馬車詞賦偶緣楊得意郤將負弩詫鄉閭松雲白鶴孤松偃蹇白雲深返照仍留半壑隂老鶴有巢歸倦翼箇中應不受塵侵一醉韻幽居嬴得寸心寬獨酌花前也盡歡醉後不知明月上醒來惆悵共誰看酒量真同德量寬昔年曽侍罄交歡于今渴想頭濡墨無惜因風寄我看題菊夀上虞陳處士古稀華誕屆重陽采采東籬菊正芳想見聚星堂上客夀觴齊舉溢秋香為制頺齡藝此花清芬全屬太邱家夀筵仍及重陽後勝采金英泛紫霞和西涯新搆園亭韻二絶獨樂園深引趣長江南有地亦宜桑素衣不怕淄塵染京洛相忘即故鄉諸葛當年算亦長成都八百勝栽桑南陽回首終遺恨錦里祠堂是異鄉對菊二絶山莊過雨菊含香十月中旬未著霜天為衰翁留好景賞心何必定重陽呼兒插竹補殘籬籬下經秋菊未衰欲藉晚芳娛老眼故教重護傲霜枝苦雨二絶向來井底欲生塵一雨如今動浹旬爛盡晚禾方種麥閭閻疾苦向誰陳昨朝新霽又沉霪叵奈泥汚巷陌深七八月間愁渴死當時何苦不為霖潘南山辭祿已久銓曹忽薦之初詞甚嘉閲二載陪點三次不果用乃知薦者之虛飾也因賦一絶桃李紛紛足豔陽春風何意到枯桑蕭然白髮丈人行郤作少年三伴郎縉紳間以陪點為伴郎蓋善謔也牙藥餽雪湖因寄二絶老來生計只加餐欲效張倉諒獨難餘齒無多願加愛莫矜舌在忽衰殘秋風蕭瑟未須悲天道虧盈自有時但得此身強健在重徭凶歲謾支持時歲既歉加以重徭頗為所窘故此奉慰和林待用都憲雲莊二絶生涯爭似故園長田有嘉禾樹有桑千頃白雲山萬疊箇中真是地仙鄉聞道雲莊野興長山雲飄渺接扶桑素心願結逍遙社恨不移家共一鄉摘桕次雪湖韻霜桕枝高白間紅珊瑚凌亂玉璁瓏芳膏擬作春臺燭照破羣隂大有功雪湖自杭還辱示對雪見懷之作次韻二首奉答因致問勞之意雪忩坐對一燈青逺道懷人倍覺醒想見歸舟夜乘興忍寒直過浙江亭悠悠世路眼誰青可是羣酣對獨醒報道山園梅破臘待君同上雪香亭小仙夀意為魏二尹題王母西池啓壽筵羣仙歌舞正喧闐是誰來獻蟠桃實請問湖南吳小仙葡萄為楊仲謹題瑤池秋蚤動涼風吹落玄珠萬顆同拾取一枝聊把玩只疑身在水晶宫題范以貞太守去思碑千里棠隂去後思宛陵真續召南詩流芳寧復需貞石終古閭閻口似碑和羅峯郊壇一首萬世承祧歸聖哲一時匡弼備公孤嘉謨入告君無忝尸素優遊獨愧吾又和羅峯郊壇一首路入青雲凌紫閣調高白雪擅騷壇耄年何幸從公後蹇步追趨更覺難贈眷弟陳一之之任南昌司訓詩一首吏部傳家羡太常銀臺秋署倍增光君今莫厭芹宫冷一脈書香足紹芳癬瘡有感癬瘡在告憶當時問勞殷勤荷聖慈畎畝老癃仍病癬捫瘡懷舊不勝悲思母懷德二絶為孫薌作鄉孰髫年鼓篋遊倚門長抱涉波憂石梁穩架慈闈杳日日經行淚暗流人羡孤甥亦肯堂西溪宅相倍增光當年造就伊誰力白首銘心感渭陽七言律詩歸途漫興初出城懷李西涯乞身歸去荷溫綸當寧深仁念舊臣犬馬力疲徒戀主金蘭誼重更懷人鄉心已負青山久客路真慚白髮新猶幸潞河氷未合匆匆解纜問前津蚤發潞河柬何冬官千里鄉心逐鴈飛晨光初動尚熹微送迎深愧勞賔主今昨何煩問是非自在沙鷗眠岸逈凋零霜葉挂林稀十年京洛歸來晚猶喜淄塵未染衣舟次曉起書所見清曉推篷滿地霜舟人呵手㺯帆檣孤村蕭索炊煙鮮高岸凌兢引纜長潦水帶氷趨瀚海寒雲夾霧擁朝陽平生憂國心仍在回首神京一慨慷與逈弟戲奕飽飯舟中漫奕棋虧成何用置欣悲平吳論協推枰日破賊功輕折屐時間裏紋楸供伴侣老來駑馬倦驅馳舊時賭墅荒蕪久今日歸來慰所思舟中課兒誦習一經舊業本家傳盛世遭逄亦偶然匡濟已孤明主託繼承猶望後人賢陶翁飲酒寧非逹杜甫吟詩祗自憐分付爾曹勤努力未來吾復任蒼天夢先隴先隴睽違十二秋夢魂合眼到松楸覺來枕席頻清淚歸去帆檣足勝遊逸少間情還自誓淵明雅志復何求從今不負牛屯景煙月晴花共樂邱蚤發臨清喜晴昨宵風雪阻嚴程今日前途喜復晴萍水襟期成汗漫鴻泥蹤迹尚分明舊遊乍覺三秋逺歸路真誇五兩輕海上間鷗迎野老向來塵席任誰爭東昌道中遇雪夜床冷徹舊青氊蚤起推篷雪滿船縞帶迎風輕著水琪花拂樹逺連天崢嶸閘溜懸氷柱迢遞村墟破曉煙為語兒童寒莫訝屢豐應復兆來年柬商茂林郎中二首文毅公之子時方總理河道斯文鄉曲舊通家宦路相看幾歲華邂逅紅亭煩駐節殷勤青眼未生花石尤風急仍留客都水司存逺建牙南旺湖頭重分手碧波離思兩無涯當年知已辱尊翁草野諸生揖上公璞玉久慚虛重價芝蘭今喜見芳叢踈星向曉芒猶北潦水經秋勢亦東欲寄椒漿酹松檟歲寒心迹後先同朱節婦壽詩即彥明之母瑤池絳燭藹芳辰青雀西來送喜頻歡動綵衣歸上國香生壽酒熟先春閭門詔旨旌慈節尊爼詩歌集縉紳花甲才周知未艾老天應念苦心人次韻答闕冬官拯德懋祭酒之姪時方專理沽頭諸閘菲才久已成尸素宦路真宜避俊英漫向江湖尋范蠡盛陳車馬詫桓榮邦家末命孤先帝鄉里斯文屬後生珍重通家情獨厚相逄青眼倍分明謝溝閘阻風柬黃敬夫驛舟才過下沽頭竟日飄風阻謝溝亂石狂沙深閉户酒杯棋局漫添籌險夷有分真隨遇行止無端可自由寄語同途諸逆旅前程何必歎淹留舟次彭城同年洪憲副以書來迓賦一律奉答淮揚封畛接青徐滿道風霜按節初雞黍偶成千里約寒暄先枉一緘書交情誰復如同榜宦路吾方愧二疏只恐相逄又相别嚴程欲進更趦趄吕梁阻風奉懷洪都憲年兄望中雲樹兩馳情風雨連朝阻客程使介逺煩都憲節交期不負歲寒盟吕梁自昔開天險禹貢如今賴地平明日相逄成一笑波濤過眼未須驚次洪都憲韻懷馮佩之憲副二首當年已怪馮唐老一别于今又十年洛社衣冠原有約汝湖風月浩無邊衡門舊業荒三徑斗酒新歡擬百篇更喜登臨隨意足不勞重費買山錢結社久慚違素約歸休今喜共餘年悠悠世事俱身外點點霜華漸鬢邊幸有賜金供客具漫勞郵卒遞詩篇舊時行樂湖山在明月清風不用錢京口遇鄉人聞得曽孫喜而有作人報丹山又一雛客途尊酒足歡娛傳家敢謂多隂德對鏡無煩鑷白鬚歸去庭前添玉樹間來掌上㺯明珠鄭公事業吾慚比舊笏惟應付阿謨偶逄鄉曲話寒暄報道蘭階雨露繁林下舊遊歸一老眼前新喜見曽孫公卿知已慚先德清白惟應遺後昆囊底賜金供具足間情寧復問田園答馮佩之用前韻高閣小車真渴望迎門一笑正新年聚星光燭稽山下會老堂開汝水邊㺯月吟風償宿債投桃報李續殘編吾儕真率無兼味卻怪何曾食萬錢人日喜晴仍用前韻柬佩之歲暮還家頻苦雨今朝忽霽喜占年陽回泰運開天上風送春聲到耳邊知已漫成怡老會養生方學悟真篇晚來聊試登山屐踏破青苔滿路錢佩之約會牛屯山莊雨不克赴辱詩見貺依韻答之夜床欹枕到天明客悶重隨舊雨生雞黍真慚千里約松楸未慰十年情山中雲滿孤持贈海上鷗間遲結盟明日携琴候蘿徑已占鐘鼓報新晴再次韻約佩之狂客歸舟戀四明鑑湖春水應時生澄波萬頃原無價霖雨彌旬似有情放浪形骸娛晚景平分風月記前盟剡溪雪棹猶乘興簷鵲朝來已報晴正月草四日會佩之于牛屯山莊次韻粗糲盤餐愧客筵熹微晴日蚤春天畫屏影落前巖樹玉珮聲分别澗泉雲載鶴還添暮景雨催蛙動報豐年杖藜無惜頻來往老去溪山轉覺便太宰屠公見過用前韻奉呈二首華裾鳴佩擁芳筵巷栁墻梅照逺天檀板驟驚林外鳥茗甌頻試竹間泉山隂命駕輕千里彭澤停雲近十年社會從今成舊約滄江來往一舟便湖上春風列小筵畫船輕漾水中天行憐蠟屐開新徑坐愛流觴曲引泉京邸離懷頻入夢江鄉交誼久忘年山殽野䔩休相笑真率從來送屠公出姚江奉和途中即事一首四望潾潾麥浪平午風村落逺雞鳴搴帷到處兒童識負弩驅時驛吏迎野水橫舟人欲渡山雲觸石雨還生明朝同上龍泉頂一舉何妨纍十觥又和登龍泉絶頂一首迤邐蟠龍接祕圖雨中臺殿晝糢糊神仙勝境餘三島狂客歸舟任五湖地近東冥先見日樹連南郭晚棲烏高軒過處人爭訝一片氷清照玉壺次韻復賈揮使韜略勳名羡世官旌麾時復上騷壇才兼文武仍專美念及瘡痍每問安海嶽遙連門閥壯氷壺清映甲光寒滹沱麥飯須存記不為時平獨飽餐三月六日過佩之雪湖山莊次韻雪湖千頃自天開十載幽期共此杯栁浪乘風輕蕩漿桂巖經雨半封苔客衣香惹蘼蕪動農事忙驚布谷催松下為豫通一徑南岡從此破崔巍再遊牛屯山莊和聨句韻答雪湖佩之號也碧山歸共太平年香社風流到海邊春入林間無數筍雨餘樹杪幾重泉煙霞怡老真成趣農圃求師不吝傳雪湖栽松得法亦豫授之也相隔高岡才咫尺路通尤覺往來便次韻答林待用都憲碌碌塵羈愧北山聖慈優老許投間長孫幼子書千卷明月清風屋數間晚眺有時隨鶴步春眠無夢到鵷班閩江越嶠神交地杖履何由日往還山莊楊梅熟摘奉雪湖辱詩并惠乾笋仍用林都憲韻答之每因苦筍憶家山不為黃公強乞間玉版久嫌千里外渭川今在兩湖間美專吳楚尤非昔清絶夷齊孰與班慚愧投桃真野意殷勤瓊玖荷公還五月十七日山莊避暑次韻答雪湖蘭亭怪底不成章興在溪流曲引觴水竹舊居還老懶盤餐雅會任清狂陶潛適俗悲塵網王績逃名托醉鄉一曲滄浪歸晚棹荷風十里送新涼山亭新構柬雪湖小結茆亭傍澗阿兩峯前後鬱嵯峨看山恰彀支頥臥問字何妨載酒過甃石路回青嶂合鈎簾忩度白雲多登臨不爽清秋約預遣家僮掃薜蘿和潘南山山居秋懷落葉蕭蕭擁暮林箇中行迹杳難尋雲連白石南山燦雨急寒潮西澗深苦思旋添新鬢雪高懷輕撇舊腰金秋光又到東籬菊斗酒何當共醉吟和山亭聫句韻答雪湖朝來爽氣滿西山山下幽亭稱我間落葉擁階風掃郤飛花渡水鹿銜還呼童剪棘通虛谷引杖探泉過淺灣醉後留題向深竹笑看龍籜解新斑病目再和山亭聨句韻柬雪湖陶翁雅性在邱山晚歲看山喜更間三徑清隂寒不改千林倦翼暮知還煙橫樹杪層分障風逗溪聲幾轉灣數日養疴深閉户庭前想見雨苔斑病目再疊山字韻遣悶柬雪湖老來青眼只湖山造物何緣妬我間塵翳本空寧是色神光不逺未全還霧中霜樹春三月