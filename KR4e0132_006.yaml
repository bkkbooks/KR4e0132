壑船與君相對且高眠有時唱和間消日無意行藏直任天山下草堂慚緑野雲間松鶴訝青田蹇驢輕䇿湖南路人識尋詩孟浩然林閣湖亭載酒船畫圖須出李龍眠棋方禦敵輸安石詩不求工慕樂天香露瀉荷侵緑水暖煙生玉靄藍田地當偏處心逾逺午睡醒時正閴然豪來時復棹􅘑船茶臼無聲隱几眠風入疏松清徹曉雨深豐草碧連天五千卷在聊撑腹三百廛空漫力田郤憶班生獨何事逺將文字勒燕然雨後再過山莊述懷呈雪湖六首平湖新漲駛輕船芳草添茵愜醉眠車馬塵空山郭路桑榆景好夕陽天過墻濁酒來村市同穎嘉禾出甫田水底蛙聲真鼓吹夜來和雨更喧然水靣晴雲載滿船半坡新緑看牛眠風生翠簟不知夏月到青樽一問天隨處好山皆樂地應時甘雨及私田興來毋惜頻相就蔗境優遊豈偶然午風停郤採蓮船不奈蟬聲聒晝眠石竹淨遮炎熇地山亭高起泬寥天無魚莫漫歌長鋏多稼方當頌大田獨恨酒腸元自窄兩蕉葉盡已頺然前溪返照入漁船老鶴歸巢倦欲眠樹杪嵐光停落日雨餘水色共長天身方自在重茅屋家未全貧足芋田時覺清風生兩腋凌雲氣在欲軒然采菱歌動隔溪船竹几藤床正熟眠林徑逶迤麋鹿洞村墟掩映鷓鴣天間情久已拋塵鞅生計何當廢硯田世路風波無定在湖山相對只依然雨中觀稼自搖船行見懷新喜不眠志慕陶翁深避俗學慚孟氏亦知天當時匡濟無長䇿今日遺安只舊田最是國恩酬未得鼎湖翹首一澘然再酬雪湖見過仍前韻五首詩懷強半在湖船雲影山光伴獨眠豹變正須斑隱霧鵬栖安用翼垂天松風遙度驚秋壑梅雨遲通慶晚田忽報西岡來欵假足音空谷正跫然會心時共㺯漁船君去寧嗔我醉眠曲徑莓苔荒宿雨洞門梧竹失炎天延年賸有燒丹竈抱璞能無種玉田今夕不須重秉燭坐看明月兩醒然收拾魚竿且泊船歸來一犬枕階眠畫欄影轉簾垂地仙笛聲高鶴在天投贈未酬青玉案從遊還傍紫芝田靜中真趣忘言久坐對雲山兩嗒然誰家簫鼓閙湖船人自酣歌我自眠蒼狗變時雲作雨老龍騰處樹參天草坡歸犢皆詩料竹院逄僧豈福田每為濯纓兼濯足滄浪一曲思泠然風滿高林月滿船巷深雞犬不驚眠尋常草閣寧無地咫尺蓬壺别有天清話半空霏玉屑紅光一點燭丹田韻非適俗兼衰老郤喜樊籠返自然船字韻拾遺四首緑簑青笠志和船懶性從來飽即眠花落郤嗔風掃地雲開最喜日中天許身愚到從浮海課子勤方學種田忽見空霄飛一鶴馭風清氣亦翩然北垞南灣獨槳船眼花不到水中眠清虛界是真玄圃朴野風存古葛天扶老正便方竹杖嘗秋郤愛蚤禾田雲霓又渴三農望安得甘霖一霈然千頃湖波一葉船白雲堆裡任間眠燈前誰話巴山雨酒後真憂杞國天大庇萬間慚廣厦力耕方寸當良田臨流照見雙蓬鬢俯仰乾坤一慨然欲從瀛海泛樓船仙路茫茫且自眠樹擁歸雲將暮景草深零露向秋天五株彭澤新高栁十頃成都舊薄田蠟屐試乘溪上月一聲長嘯髮森然歸田稿卷六
