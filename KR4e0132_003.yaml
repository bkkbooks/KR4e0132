body:
  text: 歸田稿巻三明謝遷撰祭文類祭吉太守文惟公宏才偉識蚤遂登庸郡邑之政澤及疲癃一跌弗振終老于窮天乎命乎實係其逄昔在吾郡某方童蒙小試以言受知于公成我之徳生我者同圖報未能恒切于衷曩過京口杖履獲從公猶矍鑠笑語雍雍今我来歸墓木成叢摳衣瞻拜如見儀容陳詞薦酒啜涕臨風尚享祭甘拙鄒處士文惟公世積善良家傳詩禮信義之聲洽于州里嗟予母黨譜牒是通往返于錫眷愛甚隆予昔銜哀逺煩存弔公今淪逝曷勝傷悼趨拜墓下聊表予忱公靈不昧庶其鑒歆尚享祭外母文嗚呼夀先五福孰全以生福自天錫誰其允承惟我外母克享遐齡逾八望九耳聰目明况當晩景家道日興孝養無違子孫繩繩天祐淑徳諸福具并考終以令何憾幽冥尚兹傷悼半子之情輀車將發祖奠于庭靈其不昧鑒我微誠尚享祭八舅文嗚呼昔我外祖積徳深厚慶澤所鍾我母諸舅金玉其章松栢之茂次苐先零惟公獨後公方矍鑠宜享遐夀曽㡬何時而遽顛踣嗚呼哀哉我母視公如足如手母不可見見舅如母公忽棄背復何云覯彼蒼者天吾将安咎時序推移新嵗易舊音容如在敬奠巵酒悠悠我哀公其知否尚享再祭八舅文嗚呼吾舅傾逝方切痛悲日月易邁奄及周期宅兆既下窀穸攸宜敬奠一觴奉送靈輀天地茫茫永訣于兹瞻望勿及涕淚交頥嗚呼哀哉尚享祭滑安人文同年宗元太守之配嗚呼攖寧世澤久而不替篤生聞孫亦有賢配太郡撫摩式助于内歸老鄉邦白首相對宜夀而康遐齡未艾云胡一疾遽兹長逝某忝托年家聞訃興喟靈輀載途敬陳一酹尚享祭陳周常文嗚呼昔在芹泮同遊有年暨登朝著復相後先匪直交期㛰媾且連悠悠晩景擬共林泉胡我来歸公忽棄捐感今懐昔涕淚潜然敬陳薄奠表我微䖍尚享祭十叔祖文嗚呼吾謝族姓數千百指領袖宗門如公者㡬博古通今敦徳秉禮信睦之行孚于州里義方之訓施及孫子粤有嘉名汝濱居士徳與年俱後生仰止某于諸孫夙蒙佑啓教之誨之載提其耳嵗在乙未乃初筮仕挈我妻孥至于京邸跋涉風濤歴數千里朂之官箴晨夕亹亹奉以周旋罔敢或替隙駒易流倐忽三紀幸獲歸休日侍杖履公猶强徤私心竊喜維天相吉宜錫遐祉眉夀無疆副我瞻倚云胡一疾溘焉弗起窀穸有期拜奠靈几丹旐曷歸湖南山趾顧我先塋相望伊邇哀思倍増有淚如雨尚享祭五叔文嗚呼昔我先考生寡兄弟㷀㷀孑立辛苦百倍叔惟同堂情猶一氣動輙相隨終始不二昊天降割先考遐棄夫何奄忽叔又傾逝家門不幸言何可既敬奠一觴寫我哀思尚享祭十八叔處士文嗚呼昔我先考羣從實繁濟濟一堂惟叔最少次苐凋喪存焉無㡬叔年未艾又忽傾逝家門不幸痛如之何日月易流幽明永隔臨棺一奠用寫我哀尚享祭馮太恭人文佩之憲副之母惟靈天賦淑質諸徳既備天錫遐祉百福咸萃毓秀成賢逺近瞻企禄養善養終始不異夀迫期頥倐然長逝在昔罕儔今豈有二某于令子忝托交契載拜登堂夙欽慈懿靈輀將發奉觴一酹尚享祭毛太恭人文世章憲副之母惟靈蚤以淑徳克配俊英専門之禮科甲成名中道淪没乃顯幽貞柏舟自誓玉潔氷清教成令子式繼家聲内省外臬執法明刑録養既富薦沐褒榮曽孫滿前蘭桂斯馨夀躋大耄動止康寧考終以令厚積之徵某夙蒙眷愛遂締姻盟實惟尊庇施及後生聞訃傷悼什倍恒情輀車載道薄奠表誠尚享祭太僕鄒公文惟公精勤之學既發其身堅强之操不挫于人蹇蹇宦途屢躓而起勇退急流保終如始繼志有子林壑優游胡為厭世奄忽仙遊某自弱齡過蒙眷愛今兹歸休幸接佳㑹天不憗遺遽失儀型臨歧祖奠涕淚交零尚享祭六叔處士文嗚呼吾家伯叔彬彬濟濟天降喪割存者無㡬惟叔强徤謂宜遐祉何期一疾而又弗起叔之存日親愛莫比念我顧我朝夕亹亹遽兹永隔哀痛曷己祖奠一觴靈其歆止尚享祭毛太淑人文應魁之母嗚呼忠襄大節光炤汗青内助惟賢自昔著稱桓桓大叅克紹家聲實亦慈訓于今可徵天道不爽佑于㝠㝠褒封禄養夀且百齡倐然長逝全福完名某托交令子復忝姻盟靈輀将發薄奠表誠尚享祭陳氏姪女文嗚呼吾弟蚤逝僅存汝息時方週期呱呱在側汝生不辰乃至此極念汝孤㷀孰不隱惻幸而長成克肖父徳于歸有家婦道不忒男女成行式維宗祏視汝咸宜吾心稍釋所期永年夀弟一脉彼蒼者天胡奪之亟日月如流寒暑再易佳城既卜幽宫是即遣汝弟兄送汝窀穸茫茫泉壤遂成永隔倚門遥望老淚沾臆嗚呼哀哉嗚呼痛哉尚享祭潘親母文嗚呼昔我先考托交良人吾弟襁褓遂結姻親中雖不幸親愛益篤某遊泮宫深蒙舘糓銘佩厚徳萬一莫酬嵗月荏苒已及歸休再拜登堂慈顔喜見年雖耄耋步履强徤夫何奄忽遽聞訃音感念疇昔傷切我心厚賻則宜無驂可脱敬奠一觴涕零嗚咽尚享祭華封官文商器大叅之父惟靈蚤承家學名著鄉邦慶鍾令子教擅義方甲科髙第烏臺未央禄養褒封茂膺晩福宜臻耄耋胡遽仙遊積善餘慶為後遺留某托契姻連傷悼不已靈輀将發薦此微禮尚享祭七叔文嗚呼我叔禀性最良聲利不營陶然醉鄉諸子林立教以義方幹蠱有托家道目昌未及中夀胡遽淪亡家門不幸實切痛傷窀穸有期先隴之旁敬陳祖奠涕淚沾裳尚享祭毛親母文嗚呼昔在秋官蜚英郎署家政聿修實維内助秋官蚤世有子若孫森然成立慈訓具存婦道母儀鄉閭欽企宜膺晩福胡遽淪棄衆皆傷悼况託姻盟敬陳薄奠用表哀情尚享祭邵母恭人文嗚呼昔方伯公敬事我祖恭人擇配一言而許偉哉憲副不負所期氷玉輝映室家咸宜憲副蚤休安于澹素志操不渝亦惟内助善人天祐宜享平康未及下夀胡遽云亡顧予姻家實兼舊誼松蘿失依悼傷曷既屬兹衰疾執紼莫從陳詞遣奠聊表哀衷尚享祭魁一兄處士文嗚呼吾宗昆弟無慮千指疏通易直如兄者㡬解紛導和為衆所倚善者好之洽于鄉里宜臻耄耋享有遐祉胡天不憗遽止于此宗門衰薄哀何能已臨棺一奠有淚如此尚享祭劉太夫人文應乾大尹之配仁仲宗伯之母嗚呼花封惠政庶㡬卓魯去後見思稱賢内助明庭禮樂接武䕫龍成徳曷由慈訓之功載錫褒章厚綏禄養積善在躬百祥天降夀臻耄耋諸福具全溘焉仙逝亦何憾焉某受知良人托契賢子遥聞訃音傷悼不已瞻望西蜀執紼莫從緘辭寄奠聊表哀衷尚享祭十一叔文嗚呼先考羣從藹然一堂次第凋落惟叔夀康天胡降割又忽淪亡門祚衰薄實切痛傷宅兆既卜爰歸其藏奉送靈輀奠以壷漿念叔平生以醉為鄉冥漠有知更盡一觴尚享祭妻兄華處士文嗚呼太樸既散民風日漓以智以力相詐相欺今人古風于兄見之自少至老無競無為人皆如兄官法奚施天道福善耄耋則宜詎意兄夀而止于斯傷悼之情匪直予私敬奠一觴奉送靈輀瞻望滸塘泣涕漣濡尚享祭蔡親家太守文嗚呼與公交遊粤自韋布辱締姻盟奄及衰暮新親舊知慰我心愫向在杜門久曠承晤曩嬰賤恙重煩枉顧握手論心歡如平素玩水登山公猶徤步别㡬何時遽聞公訃嗚呼哀哉惟公盛徳衆所向慕傷悼之情又況親故轉盻幽明倐更嵗序遣男代拜一觴聊具瞻望靈幃有淚如注尚享祭妹夫韓日成洎亡妹大娘子文嗚呼日成勤于幹蠱以夜為晝知其有家罔恤厥躬吾妹之賢克相于内劬勞萬状協力同心家道日隆甲于鄉邑克家之稱人無間言天而假年駸駸未艾胡遽降割相繼淪亡千年强計一旦澌泯嗚呼哀哉襁褓之兒孤嫠之婦魚之肉之將無不可扶植之念實切予懐室爾逺而徒深惻愴日成平素篤于親親周恤保愛不遺餘力無徳不報在理則然君子忍之天其昭鑒予何為哉言亦贅矣日月易邁嵗序忽改宅兆安厝尚未有期行路咨嗟冥漠知否薄陳一奠聊寫予懐尚享日成與亡妹勤苦成家厚于骨肉撫二孤侄真如已子待其妹及諸甥尤厚羅氏之富大半日成為之日成没遺孤在襁褓其妹與夫及其甥生員羅瑞七軰肆為侵漁畧無顧復之念其二侄亦然嗚呼人之不仁一至此哉予無所泄其哀憤也故為文以祭之祭孫徳成都憲文嗚呼人孰無死死得其所雖死猶生也若吾徳成之死可為得其所矣為國捐軀素志堅定從容慷慨白刃如飴生氣凛然與嚴霜烈日爭耀嗚呼孤忠全節如吾徳成者古今㡬何人哉天地之正氣于是乎在祖宗烈聖以来作士之效于斯見之豈直吾一鄉一邑之光而已哉聖明在上公論在大廷褒恤之典不日天降必有以慰九原之靈者區區衰耄之言何足為輕重哉顧惟夙昔相許不負所期激烈感慨之懐悲哀痛悼之意自有不能已者尚歆鑒之祭同年佟大叅文嗚呼同年之情異姓骨肉公守吾郡相愛尤篤惟公抗直困于煩言驥足未展僅叅一藩閩山遥遥素稱瘴癘旌斾南馳中道而逝公在仕途屈抑已多載罹酷罰天其謂何憶昨京師握手言别詎謂匆匆遂成永訣過淮聞訃痛悼不勝臨棺一奠涕淚交横尚享祭劉仁仲太宰文嗚呼天祐斯民為國生賢惟才與徳亦罕具全徳稱其才見于東川質由天賦學自家傳精専三禮淹貫羣編恂恂退抑似不能言其中朗耀如珠在淵妙齡發解唾手魁元明廷三策大對莫先爰擢史職旋躋講筵徳業日富令聞日宣乃陟卿曹乃司代言不激不隨無黨無偏柄用之望衆口同然聖明嗣統側席虚前登崇俊良茅抜茹連胡不憗遺而舘遽捐孰屯其膏不及黎元奈之何哉彼蒼者天既厚其賦乃嗇其年嗟余衰耄久已歸田江湖暌逺顧念勤惓長箋短札誼重意䖍遊從之好終始弗諼詎謂奄忽遂隔九原瞻望巴蜀心旌徒懸緘辭寄奠有淚如泉尚享再祭妹夫韓日成洎亡妹大娘子文嗚呼吾妹云亡方切痛悲曽未旬月日成繼之昊天降割乃酷如斯哀哀門户㷀㷀孤嫠雙殯在堂奄越三期平生勤苦亦復何為今聞安厝實慰我思嵗聿云暮凛冽侵肌欲從執紼衰病莫支預陳一奠奉送靈輀瞻望弗及老淚雙垂尚享祭蔡茂成憲副親家文嗚呼人羡二難曰兄與弟學貴家傳曰詩與禮孰兼得之吾鄉蔡氏仲禮伯詩後先振起青雲甲第聨芳具美追隨敭厯紆金曳紫勇退急流同歸故里錦衣晝遊光炤桑梓怡怡一堂宜享遐祉夫何奄忽相繼云逝某夙忝交遊姻盟再締葭玉失依傷悼曷已祖奠一觴聊表微意尚享祭姻家蔡孺人周氏文嗚呼家道興替實由内助慶鍾善門淑質天賦良人隱徳安于韋布儉勤相成不愆于度義方教子識達時務克紹家聲旋登仕路禄養有期年未衰暮夫何一疾遽聞哀訃傷悼同情况在親故宅兆既卜靈輀即路遣奠一觴聊表哀愫尚享祭王龍山文惟公篤志力學省魁殿元列職詞苑執經講筵旋司邦禮峻陟天官勇退急流優游故園乃有賢子繼志非凡奇勲驟建懋賞世延貂蟬赫奕寵賜駢蕃天胡不憗公逝溘先某鄉曲宦途與公周旋迄于歸老復締姻聨悼傷之懐其何可言執紼莫從心旌徒懸遣男致奠涕淚潜然尚享祭思齋兄文嗚呼先民有言兄弟孔懐世降俗漓動致喧豗嗟我與兄少小相隨出入起居秩然和諧迄今白首片言無乖我官京師兄處海涯相望相念日往月来我方歸老兄尚未衰邱園行樂幸與兄偕兄先棄我嗚呼痛哉時序易邁奄及塟埋遣奠一觴聊寫我哀臨風號慟老淚盈腮尚享祭八舅母文惟我舅母夙昔稱賢儉勤慈惠終老弗諼積善在躬福祐自天夀躋大耄子孫滿前考終以令百福具全痛惟我母棄背溘先我見舅母如見母顔今亦已矣哀何可言奉奠一觴有涙如泉尚享祭親家王方伯文惟公官至方伯位既崇矣人猶以為未究厥施夀躋古稀福亦隆矣人猶以為未及期頥公之素望允孚于人者于是乎槩可知矣盖棺事定是曰全歸而况森然蘭玉接武青雲又不卜而可期矣復何憾哉輀車將發遣兒一奠用寫哀情此固吾親友之私耳尚享祭馮雪湖親家文嗚呼世降不古朋友道喪乆要不忘㡬何人哉惟我與公夙惇道誼自壮至老曽無間然晩締姻盟愛好彌篤胡天不憗溘焉棄予俛仰之間遽成永隔湖山行樂誰復與俱嗚呼哀哉惟公達生宅兆預卜嵗聿云暮言歸其藏奉送靈輀敬陳一奠悲傷之極言不成章公靈不昧其知之乎尚享祭王守谿文嗚呼惟名與節是謂大閑名節之難全也久矣士君子行藏進退始終無玷缺者古今㡬何人哉惟吾守谿蚤冠賢科文名籍甚晩躋台輔徳望益隆及夫時與志違即引身求退優游桑梓全而歸之嗚呼若公者庶㡬其無餘憾矣乎某自蚤嵗獲從公後心孚意契終老不渝密勿之地謬先忝竊盖嘗慕推讓之義而不獲同升歸休之日相望伊邇亦嘗有㑹老之約而未償宿願夫何奄忽遽聞訃音追念平生可勝痛悼兹聞靈輀將駕執紼莫從瞻望吴門惟含淚嗚咽而已緘詞致奠聊寫我哀靈其鑒之尚享祭洪兩峯文惟公宏才偉畧超抜時英甲科髙第列職明刑中外敭厯臺省兼并望重縉紳曰維邦禎正徳之初羣盗縱横乃膺簡命四省提兵姦宄矯䖍漸次殄平媢嫉當途讒謗蝟興公即見㡬抗疏辭榮湖山佳勝鄉社良朋盤桓笑傲强徤康寧輿論攸屬國有老成謂當復起以弼明廷胡天不憗溘焉上征某自蚤嵗忝同科名意氣相與異姓弟兄宦路周旋載締姻盟天縁弗竟眷愛彌増奄忽棄予痛悼曷勝奔赴則宜衰病未能江闗渺渺徒切馳情當宁聞訃念昔股肱恤典優渥將即佳城執紼之役遣兒代行陳詞致奠寫我平生瞻望兩峯涕淚交零尚享祭楚母大孺人文惟靈夙全懿徳表則閨門慶鍾令子致身青雲循良之政惠我邑民潘輿就養閭井歡欣云胡一疾奄忽沉淪百里何怙哀動縉紳顧余衰耄病卧海濱靈輀將駕瞻望徒勤遣兒執紼薄奠聊陳尚享祭韓上舍文嗚呼安陽流澤施及雲仍司冦清徳再振家聲偉哉猶子蘭茁其英胄監䕃叙寵命是承允期驥足奮迅雲程胡為中道一蹶而傾嗟我㓜子方締姻盟葭玉失依傷悼曷勝兹聞靈柩將即佳城祖奠一觴聊表哀情尚享祭胡母黄太淑人文嗚呼家道之興實由婦徳維太淑人閨閫之則篤生賢子天賦頴特文苑蜚英賢科發跡宦路翺翔士林矜式禄養豐腴褒封烜赫慈訓足徵善慶是積夀考令終福履不忒鄉黨姻親猶切悼惜兹聞靈輿将歸窀穸敬奠一觴庶其昭格尚享祭姑夫太常少卿南山藩公洎家姑恭人文昔我先祖慎于擇壻東床之選得之途次公時垂髫頭角頴異立談之頃姻盟遂締公承我祖式克自勵我姑于歸儉勤相濟積學成名甲科髙第中外敭厯學優而仕臬司提學實惟重寄廣右大藩稱善作士親老乞休心切養志林壑優游學力益肆著述専攻屢空弗計名動縉紳薦剡相繼太常清銜寵命薦至夀躋古稀我姑先逝曽㡬何時公復奄棄當宁褒賢錫以諭祭兼命有司助營塟事即公平生可以無愧嗟我與公夙惇契誼少小相親老而不替公今全歸卜吉得地我方衰病召命忽至執紼莫從徒切馳繫遣兒致奠不勝涕淚尚享祭應天府尹陳公文公剛勁之氣足以振風紀亷潔之操足以勵貪墨明敏果斷之識又足以辨曲直而明是非是故來長吾浙憲也未及一載而聲聞四達已徹于九重遂有京尹之擢縉紳之徒孰不以公道昭明賢俊超抜為慶幸也夫何寵命甫臨忽遘危疾竟以不起矣可勝悼哉嗟予衰耄病卧海濱辱公以吾子同年之雅顧念勤惓予方期公大用詎謂遽止于斯耶然予之所以悼公者又非通家之私情而已也靈輀將駕遣奠一觴英靈不昩其鑒于衷尚享祭晦菴老先生文劉徤字希賢號晦菴河南洛陽人也嗚呼敬皇御極時稱盛治至仁如天覆冐斯世公居元寮明良相際讜論嘉謨直節勁氣誠意交孚委任無貳某忝從公後協力同志素性迂愚言多率易荷公優容曽不為異濫厠密勿茍免罪戾榻前末命同受重寄龍馭上賓權奸恣肆守正不同横罹讒忌我時從公引身退避都門一别江湖兩地轉盻光隂二十餘禩緬想風儀每形夢寐我今北上公已長逝悠悠河洛徒切瞻企緘詞寄奠臨風啜涕尚享祭姑胡太儒人文昔我先考生寡兄弟曰維二姑是為同氣天降酷罰大姑先逝未及再期姑復相繼嗚呼哀哉姑蚤孀居栢舟自誓撫孤成立幸躋禄仕闗柝雖微亦足養志迎養未㡬胡遽奄棄某欽奉召命道經徐沛瞻望夾溝曷勝馳繫嚴程有期不遑留滯寄奠一觴潜然涕淚尚享祭西涯先生文惟公海内文宗詞林人傑嗟我晩生幸從後列荷公接引不鄙疎拙紫閣同升屢更嵗月敬皇殊遇我慚淺劣同寅協恭不為容悦榻前顧托相期盡節龍馭上賓憸邪作孽于時乞身草草言别詎謂與公遂成永訣自我告歸茫茫燕越公嘗念之音問不絶聖明嗣統邪黨熄㓕我已衰頽困臥巖穴召命下臨勉强赴闕公不可見徒勞企渴公墓在兹敬來瞻謁宿草已荒含淚嗚咽公靈不昩鑒我䖍切尚享祭九叔處士文嗚呼昔我先考羣從如雲次第零落惟叔僅存我歸自京叔已臥病猶及一見動色相慶曽未旬日叔遽云亡家門凶禍曷勝痛傷日月不居遂將安厝祖奠一觴老淚如注嗚呼痛哉尚享祭諸户侯文惟公交我先君情若同氣朝夕往来終始無替先君不幸公亦長逝我今㷀㷀傷痛曷既靈柩在堂奄忽更嵗謹具薄羞遣男一祭尚享祭陳南坡文嗚呼昔我姪女賦質柔嘉獲配君子宜室宜家姪女不幸中道奄棄姻親之情終始弗替天胡降割又奪南坡念及姪女傷如之何窀穸有期靈輀將舉遣奠一觴老淚如雨尚享祭王陽明文嗚呼陽明而止于斯乎天生異才非偶然也固將以為楨于國胡為嗇其年而不使之究厥施乎夫名髙毁來自古已然陽明不理于多口亦甚矣豈平素之所自立毋乃太奇矣乎然戡定亂逆之勲表表在人耳目者九重固深知之矣又安得泯遺于鼎彛乎吾之所以悼陽明者為國惜才故爾豈直區區交親之私乎嗚呼陽明九原茫茫其亦知予之悲乎尚享祭趙古愚老先生文夫人生有聞于當時死有傳于後世是亦足矣而亦何悲惟公清資矯矯勁節危危忠孝之夙植識望之髙逺而輔以學術之精微頃以天潢首擢閩魁雲衢既奮蜚聲郎署分校禮闈幸歐裁之是協匪左右之為媒感受知而旃勉咸頌公之神鑒于不衰陟秋曹而督學乃輿論之攸推掄才品藝星光日輝指幽摘隱製電轟雷奸宄凛凛其讋服而學者則翹然仰太山北斗之巍巍詎昊天弗弔聲聞畿甸魄降番禺雖迍邅踣躓中道摧車視彼富貴夀考待生而存隨死而亡者果孰昂而孰低嗚呼公其已矣而不泯者有積慶之表與斥𢎞範之詩庶乎英風靈氣不同物而腐敗長在乎宇宙之間為後學之依歸遷也悵哲人之云萎能不為之泣涕而躊躇嗚呼公既有文為不朽有名為不死而臨風遥企不能忘情者盖為斯文慟而豈以哭吾私歸田稿巻三
