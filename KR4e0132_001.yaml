body:
  text: 歸田稿巻一明謝遷撰奏疏類謝存問疏致仕少傅兼太子太傅禮部尚書武英殿大學士臣謝遷謹奏為謝恩事臣遷伏䝉聖恩賜勅遣官存問且加賜羊酒輿𨽻官廪臣遷誠惶誠恐稽首頓首拜受竊念臣本菲才誤䝉孝宗敬皇帝知遇之隆顧託之重欲圖報稱勉竭駑庸不自知其力之不足既而格心無術輔導罔効引身退避杜門省愆俯仰懐慚罪責難逭分與草木同腐幸而溝壑未填兹者伏遇皇帝陛下天啓聖明嗣承大綂一新萬化雷動風行凡在疲困之徒咸遂更生之願如臣衰朽特軫聖慈不加負國之誅重錫優老之典寵命下及慚懼交并顧兹垂暮之年諒無圖報之日惟有一言獻納庶㡬少効涓埃臣聞傳説之告髙宗曰學于古訓乃有獲又曰監于先王成憲其永無愆此誠告君之至言為君之要道也自今觀之所謂古訓者二帝三王之典謨訓誥及諸經史之所載者是已成憲者聖祖神宗之典章法度凡今諸司所職者是已仰惟陛下聖性之睿哲固出于生知而聖徳之成就必資乎問學經筵儒臣分直進講所以薫陶㴠養者在是燕閒之時尤博覽羣籍以廣見聞茍有疑義難明即召勸講之臣靣賜質問務求通解戒一暴十寒之失積日就月将之功則聖學緝熈而聖徳之成可以追踪古昔帝王之盛近代不足言矣我朝祖宗之法斟酌古今之宜諸司而能恪守萬世可以常行奈何世逺人亡政久弊積漸失其初者有矣聴覽之際謂宜申飭百司講求成憲茍有窒礙難行即召執政之臣面加商確務合舊制究詰舛訛之端振革廢弛之弊則聖政有恒而聖治之成可以紹休聖祖神宗之盛垂裕于無疆矣夫一日萬㡬固未易縷陳而一心萬化惟在于知要臣故特舉君道之至要以裨聰明之萬一其他軍民利病政治缺失陛下明詔許諸人直言無隱况以言為職者林立于廷必能為陛下次第陳之惟望留神省覽不以踈淺而或遺不以拂逆而見拒則宗社幸甚生靈幸甚臣受恩深重不勝瞻仰懇切之至為此具本専令長男謝正齎抱赴京謹具奏聞伏候勅㫖謝時加存問疏致仕少傅兼太子太傅禮部尚書武英殿大學士臣謝遷謹奏為謝恩事臣先䝉聖恩賜勅遣官存問具本令長男正齎抱赴京謝恩荷䝉聖慈温㫖慰諭褒奨過情且録䕃臣男正為中書舍人隨該正以母徐氏病故在家具本乞恩終制復䝉聖恩欽賜臣妻徐氏塟祭并齍糧麻布之賻近又該都御史何天衢奏為優老乞言以裨聖政事濫及臣名節該欽奉聖㫖還著有司時加存問陛下䘏臣之私既及臣子又及臣妻而于臣之微軀尤荷軫念猥厪告存仰惟天地㴠育之仁不遺衰朽顧臣桑榆垂迫之景莫報恩私惟遥瞻闕廷勉効嵩祝而已為此具本令男亘齎抱赴京謝恩臣不勝懇悃之至謹具奏聞伏候勅㫖辭免恩命疏致仕少傅兼太子太傅禮部尚書武英殿大學士臣謝遷謹奏為衰病陳情辭免重命事臣某伏䝉聖明因大學士楊一清等論薦特遣行人齎勅召臣又命鎮守巡按等官来即臣家敦趣起程臣聞命驚惶罔知攸措竊臣本以駑劣之資昔叨重任負孝宗敬皇帝顧託之命死有餘責皇上嗣承大綂之初不即誅戮曲加恩禮存問優恤有隆無替臣銘心刻骨圖報無由兹又渙頒寵命賁及丘園起臣于衰廢之餘欲還臣于密勿之地且許以優逸預斷辭章異數殊恩自昔罕比臣非木石寧不感激思奮奈臣犬馬之年垂及八旬疾病侵尋衰憊已甚耳目之視聴不真手足之動履欠便加以痰𠻳眩暈不時交作摧殘無用之状實有難盡言者雖欲勉强就道誠恐委頓不前反累陛下優老之仁莫副陛下虚席之意且以一清等之所推薦勅㫖之所期待臣自揣淺薄雖在强壮之時亦非敢當况今衰殘如是之甚乎臣是以趦趄縮恧寢食靡寧慚汗憂惶措身無地遥瞻天闕徒切馳戀而已恭惟皇上英明天縱聖徳日新寤寐求才宵旰圖治此誠雲龍風虎之㑹而臣以桑榆景迫犬馬力疲不能就攀鱗附翼之列咨嗟感泣不能自已伏望聖明諒臣愚衷憫臣朽腐容臣辭免恩命俾得保終于丘壑不致隕越于道路則始終成全之恩真同天地矣臣不勝懇切仰望之至為此具本令男某齎抱赴京謹具奏聞伏候勅㫖乞恩仍賜歸休疏致仕少傅兼太子太傅禮部尚書武英殿大學士臣謝遷謹奏為懇辭重命事臣昔濫叨任使奉職無狀引疾乞休跧伏海濱二十有餘年矣誤䝉聖明軫念召命下臨臣自知衰病不堪已嘗具本辭免伏蒙温㫖慰諭且命有司敦趣臣感荷殊寵莫報涓埃只得力疾奔馳不遑他恤幸獲進趨闕下仰瞻天顔慶忭之私無可云喻退自省念慚懼交并恭惟皇帝陛下聖明天啓政化日新方将展古昔帝王之大猷廣祖宗列聖之丕緒惟兹密勿之寄必需卓越之才如臣庸劣衰頺豈宜謬玷行列此臣審知愚分實非崇飾虚詞伏望聖慈俯垂矜察仍賜歸休庶不貽覆餗之譏以負虚席之意臣不勝懇悃之至謹具奏聞伏候勅㫖辭免新職疏致仕少傅兼太子太傅禮部尚書武英殿大學士臣謝遷謹奏為辭免新命事臣以庸劣衰殘勉趨召命自懼不堪重任懇乞賜歸伏蒙皇上不輕棄遺益隆恩寵既奉温㫖慰諭又蒙特勅吏部陞臣尸部尚書謹身殿大學士臣聞命戰兢措身無地竊念臣自退休田里優游散逸二十餘年今方進趨闕廷未及勉効分寸而遽叨殊錫雖欲强顔承受寧不内懐慚悚臣感荷聖恩思圖報塞萬一再不敢固求賜歸但乞容臣辭免新陞職銜仍以舊銜供職庶㡬心安理得可以圖効涓埃臣不勝懇悃之至謹具奏聞伏候勅㫖陳政事疏少傅兼太子太傅户部尚書謹身殿大學士臣謝遷謹題為獻納事臣以庸劣衰朽不能仰稱任使累疏乞休未蒙俞允竊自思念無可以報厚恩敢陳一得之愚冀効涓埃之益恭惟皇上赫然勵精鋭意更化深懲寛慢之弊痛革黨比之私此誠大有為之資不世出之主臣愚何幸躬逄其盛然臣嘗聞之君道固貴乎剛居上以寛為本求治不可太急更張亦須有漸若驟加嚴迫恐惶駭失措者多矣且為政惟在得人人才亦甚難得若棄短取長則人皆可用小過不宥則下無全人况更易頻數則人無固志茍圖免責事亦難就緒矣臣願陛下大擴天地之量少霽雷霆之威明察之餘濟以寛簡剛斷之際加以含引廣招賢之門開自新之路使有過者可以改悔不及者可以勉力至于用舍之際務合衆論之公如此則人不乏用事功可成矣陛下以納誨輔徳待臣臣願陛下成雍熈太和之治故不敢不盡其愚伏望聖明俯賜採納豈惟愚臣之幸實宗社生靈之幸也謹具題以聞求納諌疏少傅兼太子太傅戸部尚書謹身殿大學士臣謝遷謹題為獻納事臣退休衰耄分與草木同腐荷蒙聖明篤念舊臣特勅召用不容辭避且待臣以納誨輔徳之任夫朝夕納誨以輔台徳此商髙宗之所以待傅説者也顧臣庸陋何敢妄希古人然思無以仰答陛下之殊遇因敢竊取古人之緒餘以獻傅説之告髙宗曰木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命盖謂君徳莫先于納諫君能納諫則臣下不待命令而信從矣天啓聖明嗣承大統從諫如流天下稱聖既而進言者執見或謬拂逆過甚致有齟齬間隔而近来諫諍之言日益稀矣此固臣下不能将順聖徳之過也臣又嘗聞伊尹之告太甲曰有言逆于汝心必求諸道有言遜于汝志必求諸非道盖謂鯁直之言人所難受㢲順之言人所易從難受者未必皆非故必求諸道不可遽以逆于心而拒之易從者未必皆是故必求諸非道不可遽以遜于志而從之盖欲矯乎情之偏也臣愚伏願陛下兼聴廣納于諸逆耳之言曲賜優容以作忠直之氣于諸遜志之言詳加審察以遏諛佞之風則聖徳日新聖治日隆矣此輔徳第一義也故敢冐昩陳之伏惟聖明留意縁係獻納事理謹具題以聞乞賜歸休疏少傅兼太子太傅户部尚書謹身殿大學士臣謝遷謹奏為衰老陳情乞賜歸休事臣犬馬之齒今年已八十矣去嵗誤䝉聖恩特勅召用不容辭避臣勉强奔趨忘其力之不足既獲瞻覩天顔恭謝恩命自惟衰殘昏耄無以仰副驅策即欲懇乞歸休伏䝉皇上不棄駑朽進臣户部尚書謹身殿大學士職銜照舊内閣辦事旋復憫臣拜起艱難免臣常叅異寵殊恩益深感激黽勉從事又自入朝以來仰見皇上聖徳天縱而日新聖學緝熈而罔間鋭意更化夙夜勵精此誠千載之奇逢也臣雖無似亦欲思依日月之光以觀雍熈之治奈病隨年至力與年衰視聴不真動履欠便又况昡暈時作神思不清今就列備員已更時月而納誨輔徳莫效涓埃雖皇上不咎素餐臣心能不自愧乎伏望聖慈曲賜矜憫容臣仍舊歸休俾得及未盡之年遂首丘之願則陛下始終成全之恩真與天地同矣臣不勝懇切仰望之至謹具奏聞伏候勅㫖再乞歸休疏少傅兼太子太傅尸部尚書謹身殿大學士臣謝遷謹奏為衰病懇乞歸休事臣以年衰力憊不能仰稱任使具本乞休伏蒙聖㫖朕圖任老成賛𢎞化理卿先朝耆舊徳器才識公論素孚召用未久方切倚毗况精力未衰豈可遽求休致宜即出供職盡心輔導以副朕懐所辭不允吏部知道欽此臣仰承恩命益深慚懼竊念臣迂愚無似休退有年自分與草木同腐而已猥蒙皇上不輕棄遺起臣于衰廢之餘還臣于密勿之地實出望外臣當鞠躬盡瘁圖報恩私使臣能効涓埃之益則雖捐軀隕首臣亦何敢自愛奈臣衰頺已甚槁木不殊而謬玷崇班虚縻厚禄此臣所以朝暮懐慚不能自已者也仰惟皇上英明天縱赫然勵精寤寐求賢共圖化理今調爕重任已甚得人而臣以朽腐無用之資濫厠其列誠不足為有無若復茍且淹延不求退避則尸位素餐之誚必不能免而妨賢病國之罪亦将何所逃乎伏望聖慈俯察愚衷蚤賜俞允使臣得生還故里則未盡之年皆陛下之賜也臣冐凟宸聰無任戰慄之至謹具奏聞伏候勅㫖謝恩疏少傅兼太子太傅戸部尚書謹身殿大學士臣謝遷謹奏為謝恩事臣昨以衰病乞休荷蒙温㫖慰諭未即賜允情不獲已再疏懇乞復蒙聖㫖卿兩疏乞休情詞懇切朕所深諒但朝廷任賢求舊卿碩徳舊臣方切倚任豈可固求休退宜即供職不允所辭欽此即又重荷聖慈軫念命太醫院官診視用藥又命内臣頒賜酒肉米蔬等物又命鴻臚寺官来家宣諭殊恩異數倍萬常倫臣感極而泣不能自已即欲詣闕稱謝勉强供職以圖報涓埃奈臣痰火眩暈之疾舉發無時恐或顛仆階墀貽笑班列是以趦趄縮恧尚在調理謹先具本謝恩竊念臣年既耄身已衰甚病非外感藥物難療每自忖度朝不保暮恐終無以報塞厚恩伏望聖慈曲垂矜憫蚤賜允俞俾得生還故里則始終成全之恩没齒豈敢忘哉臣無任懇悃之至謹具奏聞伏候勅㫖三乞歸休疏少傅兼太子太傅戸部尚書謹身殿大學士臣謝遷謹奏為懇切陳情乞賜歸休事臣以衰病昬耄不能仰稱任使累疏乞休荷䝉温㫖慰諭未即賜允即又重荷聖慈命太醫院官診視用藥又命内臣頒賜酒肉米蔬等物又命鴻臚寺官來家宣諭皇上篤念舊臣不忍輕棄恩禮優渥有加無已而臣不能圖報萬一是以靣熱内慚寢食俱廢惟乞身引退庶可少贖負恩之罪隨即具本陳謝復申前懇乃又節蒙聖㫖如病痊可宜照前㫖即出供職以副朕召用倚毗至意不必固辭欽此臣聞命戰兢益切慚懼己於今月十六日力疾入朝陛謝思欲勉强供職圖効涓埃奈痰𠻳眩暈之疾忽復交作動虞顛仆不能支持臣年既衰邁病復纒綿雖欲茍延不過虚縻廪禄而曠職怠事之咎抑将何所逃乎臣是以不避煩凟冐昧懇陳伏望聖慈曲垂矜憫蚤賜允俞俾臣得遂生還之願則始終成全之恩真與天地同其大矣臣不勝懇悃之至謹具奏聞伏候勅㫖四乞歸休疏少傅兼太子太傅户部尚書謹身殿大學士臣謝遷謹奏為懇陳愚悃乞賜殘骸事臣以老病乞休再四陳懇伏蒙聖㫖朕以卿先朝耆舊况輔臣所薦特虚席以待其所倚毗非輕望以匡弼朕躬賛襄化理卿屢屢為辭固欲求去大臣事君當以竭誠盡心為忠舍邪從正為本庶可引君當道為善治以福斯民卿宿儒博學理慾公私豈不曉然可勿以去為辭即出辦事副朕求舊召用之意欽此臣聞命驚惶不勝感泣皇上所以俯念老臣者禮遇優崇慰諭諄切天髙地厚之恩有隆無替顧臣何人可以當此臣遵奉聖諭敢不痛自修省仰承徳意即欲勉强供職圖効涓埃奈臣犬馬之年已及八十元氣虚耗疾病交侵手顫足痿目昏耳瞶痰鬱氣逆胸膈痞憊而眩暈顛仆時切懐憂朝夕不能自保恐難久于人世此臣之所自知而急欲求去者也若年力尚可支持而崇飾虚詞茍求安便則臣之罪無所逃矣恭惟皇上好生之徳真同天地優老之仁逺邁帝王臣是以敢冐昧陳懇煩凟宸聰伏望聖慈曲垂矜憫蚤賜允俞俾臣垂盡之齡得全歸于首丘而未朽之骸不隕越于道路則臣雖不能圖報于生前亦當感恩于地下矣臣不勝激切仰望之至謹具奏聞伏候勅㫖謝恩疏少傅兼太子太傅戸部尚書謹身殿大學士臣謝遷謹奏為謝恩事臣以衰老病憊懇乞歸休荷蒙聖慈憫念特賜允俞而寵禮優渥體恤周備已不勝感激今日蚤陛辭復蒙加賜白金襲衣文綺寳鏹以為歸榮聖主所以惠養老臣者無所不用其至誠天髙地厚之恩也臣稽首頓首拜受訖顧臣桑榆景迫已無圖報之日即今違離闕廷徒切戀慕惟廻瞻北極祝聖夀于萬年尤願慶協前星綿本支于億世此臣區區犬馬之忱没齒不能少忘也謹具本稱謝以聞歸休謝恩疏致仕少傅兼太子太傅户部尚書謹身殿大學士臣謝遷謹奏為謝恩事臣以年邁力疲不能仰承任使懇乞退休荷蒙聖慈憫念曲賜允俞厚加恩典且命臣男中書舍人正䕶送還鄉臣以垂盡之齡幸叨恩庇遂得道路無虞生還故里茍延殘喘以終餘年仰惟皇上優老之仁真同天地而臣以朽腐之質莫報涓埃還家以来捫心自愧惟朝暮引領遥瞻天闕䖍祝聖夀無疆同天長而地乆更願聖學罔間務日就而月将用康九有之生靈益隆萬年之宗社此臣區區犬馬之忱也謹因臣男正囘還具本令其齎抱赴京少申謝悃謹具奏聞謝恩疏致仕少傅兼太子太傅戸部尚書謹身殿大學士臣謝遷謹奏為謝恩事嘉靖七年閏十月初六日臣本府官欽遵詔㫖恩例備綵帛羊酒來家問勞天寵光被閭里歡騰臣不勝感戴謹稽首頓首登拜領受訖恭惟皇上孝治天下尊親爰舉彛章加崇徽號又推廣孝之道誕敷錫類之仁詔示萬方恩覃庶類甚盛典也臣以衰朽之質荷涵育之慈方遂歸休躬逄嘉㑹濫叨殊錫夐出常倫何幸如之愧不能趨覲闕廷隨班慶賀仰瞻宸極馳情祝頌而已伏願皇上純嘏天錫益隆至養于萬年聖治日新永得歡心于萬國臣不勝懇悃之至為此具本令弟謝遜齎抱赴京謝恩謹具奏聞謝恩疏致仕少傅兼太子太傅戸部尚書謹身殿大學士臣謝遷謹奏為謝恩事臣某伏蒙聖恩以明倫大典書成特差鴻臚寺序班楊孫元頒賜臣一部天寵光被閭里歡騰臣不勝感戴謹稽首頓首登拜領受訖恭惟皇上誕膺天命纂承大統倫序素定普率歸心誠非前代嗣統之君所可擬倫者也皇上徳隆孝治禮重尊親明倫大典之作昭揭萬古之綱常式成一代之典則此誠大聖人之制作非尋常膚淺之見所能仰窺者也臣質本迂愚年復衰耄往嵗强趨召命旋乞歸休重荷聖慈憫念俯賜允俞雖嘗濫叨總裁之命未能少効微勞及至書成進御之時不獲追隨班列上辜恩遇内省慚惶念兹寵錫自天臣實措躬無地禮當詣闕稱謝而又衰病不前謹具本令男謝豆齎抱赴京謝恩臣遥瞻闕廷無任戀慕之至謹具奏聞歸田稿巻一
