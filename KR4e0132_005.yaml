body:
  text: 歸田稿卷五明謝遷撰五言律詩過彭城驛哭恆孫二首辛亥年省親還京女孫恆奴沒于路寄葬驛邊鐵佛寺園憶昔過彭城吾孫禍獨嬰倉皇埋旅櫬嗚咽赴嚴程骨肉久應化星霜倐屢更傷心此停棹老淚強吞聲野寺鄰荒驛孤墳出短垣老懷難割愛舊鬼亦煩寃歲晚鄉心迫天高淚眼昏哀歌不成調為爾一招魂哭母舅二首諸舅惟公在清強步履便承顔如見母抱恨又終天白鶴歸何處青山入暮年傷心誰共語涕淚獨澘然陟屺已無地私情尚渭陽十年違杖履兩鬢各星霜夀算期方逺仙遊别遽長西風撼秋木悽斷老烏腸鯧魚餽雪湖辱詩見貺依韻奉答賔館無魚日馮歡歎孟嘗淵臨輸結網芹獻侑稱觴鄉社新詩劵煙波舊釣航海鮮甘住久筌在敢相忘汪進之通判重慶堂次李西涯韻鄉評推世德家慶擅華名桂籍方鍾秀蘭階賸茁萌祿分三釡足官喜一身輕時進之已棄官歸養故云猶憶班衣後趨隨進夀觥和雪湖冬菊一首寒徑餘香滿踈簾倒影高詩狂仍落帽酒債擬償袍第品增新譜餐英按古騷同心不同賞望眼為君勞素箋餽雪湖辱詩來謝次韻答之華篇酬素楮使至一舒睂誤此瓊瑶報慚非玉屑姿粗踈承用乏雅淡慰心知聊伴中書老清風舊鳯池雪湖詩謝榖種次韻二首奉答歉歲僅存種先春蚤力災歸耕雅同志敷播合乘時今雨應非昔公田遂及私秋成倘如願再續屢豐詩取盈傷往歲作苦念荒災鄉井通吾力鎡基待此時嘉禾原有種大造本無私飽飯西成日從公細和詩和雪湖屏迹二首林臯聊寄迹瀛海久忘情郤老方頻檢耽詩癖已成晴山雙屐穩煙水一舟輕日上眠猶熟心間夢亦清谷口藤蘿密雲間碓磑幽萍開喜魚躍花褪怪鶯流自與青山約誰因白髮愁間身習成懶君莫笑科頭恭和御製除夕詩韻宇宙三陽泰衣冠萬國來皇圖真永固聖德厚加培麗日無私照明廷足俊才老臣慚朽拙遭遇亦竒哉和除夕詩大道今猶昔青陽往復來八荒歸至治萬彚賴深培天啓重熙運川慚巨濟才交修佩明訓寤寐敢忘哉和羅峯先生新春詩二首太簇初回律明堂恰祀春微風來淑氣光霰浥輕塵惠澤行多慶豐占信有神閭閻歌頌滿聖德與時新生菜堆盤細新醅溢甕香迎春先鳯沼退食總羔羊宣賜真殊寵官寮合對嘗素餐慚莫報醉飽熱中腸和羅峯郊壇韻圓丘分獻爵平步上天梯野闊旌旗擁壇高象緯低塵埃九陌淨干羽兩階齊禮畢候回輦虛忩聽曙雞五言古詩暮宿扳罾渡口水涸舟易膠舟人時復喧暮阻沙岸側野曠地亦偏問津尚云逺西日已含山寒林北風急飛鳥盡來還泊舟悔不蚤兀坐默無言慈節為朱彥明乃堂作苦節良獨難慈訓尤不易有兒歸義方庶矣柏舟誓百年未亡身祗為家門訃于今幸兩全辛苦遂初志他年泉臺路良人見無愧蚤過山莊避暑用陶韻侵晨理孤棹山居將避喧好風忽南來吹我烏帽偏宿鷺未移渚落月猶在山候門兩稚子問我何時還高山與流水此意向誰言山亭晚眺用陶韻山中多白雲深谷芝可採吾慕陋巷賢簞瓢樂不改塵世饒風波桑田倐成海人夀知幾何河清詎能待淡薄順吾常庶矣寡尤悔和答雪湖見懷及述懷各二首束髮履宦途妄意遵伊周遭逄悮明主黽勉三十秋乞骸賦歸來荒蕪念田疇所學期不負此志終遂否飄飄赤松子聊復從之遊投簮事耕稼災畬夾道周禾黍日以長少昊將司秋晨興出門巷杖䇿臨西疇俯首問童僕場圃各具否屢豐幸遂願社會尋舊遊馮公夙勤業雅志存孔周高才不獲展皮裏餘陽秋歸來守衡茅心田盡平疇世人知者寡蒼天亦知否食報諒在後卒歲仍優遊南華發高論吾昔聞莊周朝菌無晦朔靈椿八千秋塵世一夢幻彭殤杳難疇逹生貴及蚤君已洞此否往者亦已矣且復同歡遊舟至直沽長子正來迎喜而有作時正自家來省先還至德州聞豫得請復來迎也維舟向天津潮落日已晚燎火明渡頭大兒忽在眼離合豈偶然慚愧勞往返骨肉保團圓今幸遂初願喜極翻成悲相看淚如霰秉燭坐忘眠卻怪寒更短冬日過山莊感興二首山居寡人事初冬風日佳霜林鬬紅葉時復墮空階興至不自懶䇿杖臨水涯潛魚或在渚寒藻舞沿洄逝川渺東注眷然興我懷坐久無與語興盡還歸來人生固有涯胡為苦形役晚歲賦歸與林間數椽屋紫芝曄春榮白雲滿空谷怡雲更采芝泮渙吾自足易理永垂訓所貴不逺復白日坐來暮且向山中宿賞殘菊養疴日高起袖手步前楹清霜萃百卉殘菊有餘馨愛此傲霜姿巡簷掇其英掇英釀美酒酒熟當自傾人言杞菊甘可以制頽齡頽齡安可制聊用陶吾情閔菜種菜闢東園課童時灌畦禦冬藉旨蓄抱甕勤可辭戾氣逐時作菜秀蟲食之食葉猶自可食心根株摧閭閻多菜色歲饉薦加疲肉食忍獨飽喟然傷羣黎聞鴈旅鴈乘風翺薄暮聲嘹嚦寒雲暝前途營營雙倦翼問之何從來逺自沙塞北爾性固隨陽爾心乃謀食原田有稻粱亦復多矰弋空濶蓼花灘胡不暫棲息蘇司訓考妣雙挽榮榮堂北萱零落秋霜蚤依依愛日心但願椿不老養志夙所欣儒官詎云小東平來訃音别駕殞中道椿庭回首空此恨終天抱風木號慈烏啞啞徹昏曉和答王守溪少傅陶翁樂天命乘化復奚疑乞身詎嫌蚤孔戣知二宜行樂偶兹遊荏苒歲何其山林幸深密久與俗駕辭春池芳草生秋菊白露滋冥搜窮萬彚野興隨四時金蘭邈何許望望長相思將至臨清感懷昔年送嚴君清源艤舟待今日抵清源獨與妻孥會庚戍歲乞告送先君南還追至臨清始獲奉侍今年家纍先行亦至臨清相會也筮仕兩還家先後十七載甲午偕計上京至庚戍始獲乞告又自庚戍至丙寅先後皆十七年也光隂如轉燭不覺星霜改生還古所欣今幸偶然遂家山望非遙庭幃痛安在鄉人誇晝遊吾心負萊綵臨風不勝悲客淚空銀海泊臨清遇雪千林斷飛鳥萬里寒雲同朔風吹霰雪倐忽瀰長空入夜猶未已浙瀝嗚船蓬侵曉起推牖兩岸如堆瓊秋來久不雨暖氣乖深冬來牟閡生意渴望憐村農素心重憂國所願年時豐如今兆三白庶矣蘇疲癃聊城懷古戰國信多竒妾婦良足耻悠悠千載餘吾重魯連子信義屈強兵堅城書一紙功成不自居長揖歸故里諸侯欲帝秦寧蹈東海死砥柱回狂瀾流芳照青史雖非孔氏徒不愧天下士聊城已非昔高山勤仰止答衍聖公舟次濟寧衍聖公以書來迓不及赴瞻望闕里悵然興懷濟河經信宿闕里鬱岧嶤禮樂餘三代宫墻富百寮淵源洙泗合蒼翠柏松喬未遂摳衣願空煩折簡招浮雲寒擁日逝水暮侵潮氷凍愁將合鄉關望轉遙歸與心正急仰止意難消慚負賢東道緘書首重翹獨酌杯盤恆自足風月底須期往事真成夢清歡總是詩塵喧隔市逺晚色上簾遲醉倒花間石乾坤兩不知但願一樽滿何妨三徑幽身常間便足事已老宜休塵夢盧生枕風情庾亮樓書無封禪稿任待茂陵求賀雪湖得馬大夫不徒行老足難為力有馬借人乘此道已非昔雪湖一欵假往失今復得得失底須論代步良足惜曽記魯論語驥祗稱其德泛駕亦何為尋詩隨所適坂無九折途行不費鞭䇿過我勿憚煩青芻盈皂櫪山莊值風雨燈前寫懷薄暮掩衡扉獨坐風雨夕孤燈影明滅虛簷聲淅瀝擁爐撥寒灰焚香玩周易歲序倐云暮隂陽互相逼山林深且密久矣托心迹有懷在何許茫茫煙水隔夜闌清不寐曷以慰岑寂忩外一枝梅預報春消息和御賜羅峯少保韻一章明禋儼如在祼獻禮必親維兹孟春祀鳴鑾出嚴宸駿奔藹百辟電矚凝藎臣持論秉一德孝思賴以伸精誠格九廟萬嘏天錫純腹心與手足恩義真一身維賢乃至寶異瑞何足珍喜起方賡歌歡聲同兆民再和羅峯先生宸韻一首同方志乃合傾蓋即相親江鄉素寥闊何幸聨奉宸君才本經世聖主方得臣事久論乃定道在志亦伸彚征萃賢俊濟濟素絲純衰殘已無用念慮惟乞身丘壑自安分敢謂席上珍惟應揚聖化去慰遐方民徐善應西白軒次雪湖韻卜居鄰泮宫道在地亦偏過庭悲失怙禮學思紹先惟白乃受采所貴敦其原藏修靣西牖日章由暗然惜隂駒過隙養和玉生煙室中更何有泓頴清輝聨爽氣忽朝來舉頭見龍泉天光與雲影靜晝時盤旋道心永無寐坐對氷壺寒和答王守溪少傅形影兩不愧獨行胡徘徊苦憶素心人葭玉真相依朱絃被疏越不與俗韻諧會聚安可常離索良足懷岐路啜楊泣素絲成墨悲尊酒對花飲倚醉歌莫哀拂拭金盤陀壯心殊未摧間雲偶出岫薄暮還歸來青雲幾萬里渺渺雙鴻飛寄員外弟輕風吹客衣旭日照行李南還遂初志老稚盡歡喜膏車復踟蹰牽情獨吾弟宦轍偶追隨數載同京邸晨昏不暫離手足真相倚忽漫逍遙堂慚愧薑肱被一日成三秋兩地各千里會合定何時惆悵殊未已寒雲淡更濃斷鴈飛復止矯首倚蓬忩離懷逐流水新正喜雨旱暵迄三冬新正才一雨潤澤遍荒郊膏脈動深土憶昨恆陽時淵泉皆斥鹵河渠斷舟楫負載衆良苦除夕見兒童競作商羊舞東風扇祥雲入夜送甘澍始和已應占節候將可數吾衰更何求所願豐年屢丁寧向兒曹勤力事南畝時雨復時暘含哺腹頻鼓題西涯篆書卷後感懷端居數舊遊忽忽漸凋落懷哉西涯翁令德兼善謔追隨三十年文字日相樂朅來各一方歲月驚電爍行藏杳難期竟負卜居約夢寐或見之談笑宛如昨簡札時往還良用慰離索如何轉盻間翁已不可作展卷覩遺墨使我情懷惡長歌伐木篇悲風振林薄寒夜吟冬夜何漫漫展轉不得曙山城送寒更長短杳難數憶昔趨朝時夙夜畏遲誤夢中驚覺來顛倒著衣屨如今足晏眠飽食慚逸豫祖生聞雞鳴慷慨忙起舞志士不忘公而我已衰暮寒灰寧復燃頽墻詎堪圬末命孤重託何以報殊遇擁被一酸吟枕席淚如注勵學示貞五弟秀才學也本謀道聞道若發蒙孰云苟占畢而以圖自奉往聖有明訓人心如穀種敷災貴勤力不勤乃蕪茸末學更紛紜頰舌徒泉湧成功惟靜專一靜制羣動吾弟純篤資抱璞知所重科第事抑末雲衢尚修永三北豈真怯一鼓有餘勇下帷仍絶編沉潛對周孔恭和御製聽講大學衍義詩聖功本資學求道學所先道具人一心大原出于天進修必有序治化乃均平大學示綱目燦然羅目前功至德自固外物詎能遷宋儒衍奧義口末窮其顛吾皇勇緝熙光明火始然儒臣日分直勸講無間焉聖心契妙理精言發長篇臣愚續贊和微衷罄勤拳咏泉為宋通政乃翁作巨野擅幽勝源泉引慶長卜居元世業志道擬成章釀秫延賔滿研硃點易忙間來時一酌淡久日相忘酒渴頻濡吻詩枯或潤腸濯纓塵滅迹洗硯墨生香桂籍多分𣲖芹宫賸采芳謾為曽點詠不作次公狂歸老真成逸褒封荷寵光承歡羡萊子稱壽寄霞觴江西官氏二烈女次雪湖韻節義真大間浮生僅朝露誰謂捐生仁乃出兩荆布濟濟冠佩徒講習亦有數臨難輒易心寧愧所學負憶昨大江西凶逆嘯而聚皎皎雙白璧不受纎塵汚一死等鴻毛裕若身為度頗聞官氏宗自昔遵王路世德貽範謨奕葉昌胤祚丈夫槩可知大節况童孺詔旨揭門閭褒旌豈虛譽霪雨歎密雲同四郊雨腳紛麻縷稍霽忽復隂晦朔窅難數淖泥沒車輻冥煙失村塢小民深怨咨田家倍辛苦于時當斂穫是處空場圃滯穗被原隰銍艾傷沮洳濕薪不得燃濡粟那可杵晨炊不謀夕富室翻成寠杞憂夙所懷天漏伊誰補翹首望晴曦清光邈何許安得掃重隂一快萬物覩界首驛寓長至書懷甓社接高郵驛界兩湖涘官舟倦行役深夜暫留憩玉律應黃鐘報道日長至拜舞違清班闕廷渺瞻企稽首祝吾皇聖夀千萬歲雞鳴問前途新河號康濟夙昔饒風波如今穩無滯平生康濟心視此發長喟蚤起效書雲萬里無纎翳赫曦出東隅扶桑凝紫氣元化互推移新陽已回地所願君子長共樂太平世懷禹穴居間遂成懶春來偶尋勝杖䇿窮冥搜此約先已訂禹穴幾千載宫墻餘數仞梅梁嚴護呵玉笥肅清靜石刻經雨昏谷響隨風應旌旗憶東遊弓劍遺南鎮雖無羣后朝猶聞六飛騁念哉水土平濟此蒸黎病魚鱉未忘憂家室何由慶端拜誠素心兹遊復乘興興盡扁舟還歎息二難併重來會有期行止由天定靣墻為西賔王先生作一室真環堵端居總靣墻進修寧自蔽退息解深藏掃榻塵無漬翻經隙有光沉潛思闕里寤寐見陶唐燈火黃昏靜絃歌白晝長受墁非糞土充棟是書香沽酒當頭過觀梅倚角芳春隨鄰蝶至雨洗甃苔荒簷旭留冬暖山風透晚涼窺雲穿甕牖待月轉回廊俗駕何緣入佳聲定逺揚我來試推倒同上振衣岡種松苖杪冬天宇霽隂崖氷雪消荷鋤向西崦課童植松苖衆卉豈不榮未雪已先凋松姿貞且徑凌寒見孤標巖谷勢幽阻土脈亦不墝栽培藉雨露但苦牧與樵樵牧茍不侵拱把遂成喬當年手所植今已百尺條歲月尚吾與見爾復昻霄湖山歸舊隱依雲結新巢嗟嗟赤松子自昔成久要松間路不迷來往任逍遙世夀堂為周僉憲作一人闢區夏萬方歸壽域于時有天民夀百十有六陛見來安車溫綸錫優復郡宴首賔席異數表鄉俗餘慶流孫曽耄耋相嗣續五福惟壽先壽固人所欲衆情罔不同君家胡乃獨天道本生生而亦因材篤世德厚栽培膏澤賸㴠育高堂揭華匾明言常在目于今有聞孫况乃富天祿仁風載播揚憲度慎明肅崇基更加培永以延後福摘橘餽雪湖馮公獨樂園木奴動千百蒼翠鬱成溪頻年自封植秋實何纍纍清芬釀瓊液霜風旋披拂彈轉黃金色昨朝驚一空頗怪穿窬客仁者物與同亡弓楚人得高堂具甘旨此物良足惜我亦愛園居窈窕清溪側牛屯望雪湖煙霞兩山隔陸吉與黃甘馨香通咫尺愛護勤兒童秋來幸全璧慢藏戒在兹蚤向霜前摘承歡已不逮抱恨徒朝夕錫類念封人墮地懷陸績傾筐一分遺聊用寄吾臆食瓜有感衰年困炎熇閉門卧山房忽聞户外聲呼童倒衣裳僕擎兩瓜至初熟請翁嘗大盎試載浮輕刀如截肪入手玉飛屑薦齒氷含香豈惟清渴吻亦足潄枯腸憶昔忝黃扉天厨出瓊漿二月中已破內園固非常東陵歸故侯倐忽幾星霜農圃理舊業園田嗟久荒勸課勤荷鋤力至瓜蔓長蔓長味亦佳持以詫窮鄉流傳實異種沾溉有餘芳野人知美芹何由獻君王回首九天上一飯胡可忘涓埃未能報撫案徒自傷峨睂雲南望峨睂峯去天不盈咫東來千萬疊巍然獨尊峙旦時或興雲雲興雨隨至瞻望倚方隅膏澤被遐邇比來夏秋交妖魃忽為厲旱暵動旬月赤地幾千里山雲杳無蹤鄉民愁欲死無乃炎威酷雲與山俱靡朝來望山巔雲膚觸石起焦枯懷更生疲癃不勝喜斡旋諒在兹沾溉亦易爾胡為復吝施倐忽隨風駛悠揚遽天末敷賁滿山趾滂沛定何時渴望殊未已為雲固山職不雨乃山耻寄語謝山神無為孤仰止次韻詠麻糖答雪湖荒陬乏竒品屑稌成膏糖香分雲子白色轉鵝兒黃堅膠凝鳯嘴柔曲回羊腸調劑或受和佐饔先得嘗仙洞出花蕊頻斯來桂漿刀圭不遺末鼎鑊無留良沃釡嗤季倫戴帽嗟彥光溫醇擬酥酪皎潔逾氷霜歲時具甘旨秋穫豐茨梁膠牙默自固鼓腹歡欲狂初煎火亦急止沸湯再揚流傳本鄉俗取笑宜大方盤餐幸茍足珍名何敢當美芹知野人為君獻高堂弄孫值元旦敷筵佐稱觴瓦礫合居後珠玉矧在旁陽春強答和慚愧不成章病起有懷柬雪湖籬菊傲青霜庭槐拂晴昊寒簾步前除愛此風日好伏枕動旬月徑路生秋草晏起每科頭能避管寧少平生炯雙眸眥睨空塵表遐觀凌太行俯瞰滄溟小纎翳忽為孽天豈息吾老閉門養沉晦虛室樂間悄逹人戒用明至道貴冥杳獨醒對羣酣清白太分曉世路方嶮巇塵纓顧縈繞習靜信良圖知幾明不蚤餘光幸來復衰容覺枯稿形影兩不愧天真願相保浮名等身外安能置懷抱簡編夙所耽此志殊未了摩挲向明忩努力尚探討寂寞眷同心矯首城西道鵲噪燈含花衡門頻卻掃一笑定何時芳樽共傾倒哀池魚三十韻間居學養魚山池故深鑿水深恣遊泳草近足饞嚼萬物本吾與雅志與魚約數罟戒無侵微生欣有托旦夕坐臨池魚樂吾亦樂藻定預知潛萍開忽見躍始舍即悠然稍間遂咸若信孚久相忘覯影不復郤於焉得縱鱗安用尋巨壑雖乏化龍姿頗異求伸蠖維時夏景長當午暑氣薄梅天雨初霽山村澤不涸草滓積以淤土苴泛而惡對時喜魚育藏垢恤魚瘼倉卒命僕夫黽勉施畚杓泠淵出汚檅澄波翻溷濁惡臭一濫觴中魚如毒藥喁噞盡浮挺於牣頓蕭索拯救術罔功慘怛心如灼殃非城門及孽自主翁作憂之誠太勤愛之反為虐揠苖嗤宋人種樹聞郭槖孔門貴多識周詩每咨度至理固難窮細物胡不博愚因慮多得事戒忙後錯優遊詎知非閲歷乃先覺良醫三折肱失險牢著腳一咽乃廢餐既醉識斟酌魚亡池尚存恐使成濩落緣木復求魚庶用慰寂寞歸田稿卷五
